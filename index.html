<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Reader - 极简项目批注版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  :root { color-scheme: light; }

  body.theme-normal {
    --bg-main:#f5f7fb; --bg-toolbar:rgba(255,255,255,.92); --bg-header:#ffffff; --surface:#ffffff; --surface-2:#f8fafc;
    --text-main:#111827; --text-muted:#64748b; --border:#e5e7eb; --border-soft:#eef2f7;
    --btn-hover:#f1f5f9; --input-bg:#ffffff; --page-bg:#ffffff; --shadow:0 18px 45px rgba(15,23,42,.08);
    --sidebar-bg:#fbfdff; --sidebar-hover:#eef6ff; --accent:#2563eb; --accent-soft:#e8f0ff; --danger:#dc2626; --danger-soft:#fff1f2;
    --selection:rgba(37,99,235,.38); --page-filter:none; --page-blend:normal; --focus:0 0 0 3px rgba(37,99,235,.16);
  }
  body.theme-dark {
    color-scheme: dark;
    --bg-main:#101318; --bg-toolbar:rgba(18,22,28,.92); --bg-header:#161b22; --surface:#161b22; --surface-2:#111720;
    --text-main:#e5e7eb; --text-muted:#94a3b8; --border:#263241; --border-soft:#1f2937;
    --btn-hover:#202a36; --input-bg:#0d1117; --page-bg:#1c212b; --shadow:0 20px 50px rgba(0,0,0,.38);
    --sidebar-bg:#131922; --sidebar-hover:#1f2937; --accent:#60a5fa; --accent-soft:#14243b; --danger:#f87171; --danger-soft:#351a1f;
    --selection:rgba(96,165,250,.48); --page-filter:invert(.86) hue-rotate(180deg) contrast(1.06); --page-blend:normal; --focus:0 0 0 3px rgba(96,165,250,.20);
  }
  body.theme-green {
    --bg-main:#eef7ef; --bg-toolbar:rgba(248,253,249,.92); --bg-header:#f9fffa; --surface:#fbfffc; --surface-2:#f0f8f1;
    --text-main:#1f3d27; --text-muted:#5f7f67; --border:#d6e8d9; --border-soft:#e6f2e8;
    --btn-hover:#e6f3e8; --input-bg:#ffffff; --page-bg:#edf8ee; --shadow:0 18px 45px rgba(31,61,39,.10);
    --sidebar-bg:#f4fbf5; --sidebar-hover:#e4f2e6; --accent:#2f7d4f; --accent-soft:#e7f4ec; --danger:#c2410c; --danger-soft:#fff4ed;
    --selection:rgba(37,99,235,.36); --page-filter:none; --page-blend:multiply; --focus:0 0 0 3px rgba(47,125,79,.18);
  }
  body.theme-sepia {
    --bg-main:#f7f0e2; --bg-toolbar:rgba(255,250,240,.92); --bg-header:#fff8ec; --surface:#fffaf0; --surface-2:#fbf1df;
    --text-main:#473829; --text-muted:#8a735a; --border:#eadcc4; --border-soft:#f2e8d7;
    --btn-hover:#f4e8d2; --input-bg:#fffaf0; --page-bg:#fff6e6; --shadow:0 18px 45px rgba(71,56,41,.10);
    --sidebar-bg:#fff8ec; --sidebar-hover:#f3e4ca; --accent:#9a6a2f; --accent-soft:#f3e7d5; --danger:#b45309; --danger-soft:#fff7ed;
    --selection:rgba(37,99,235,.34); --page-filter:none; --page-blend:multiply; --focus:0 0 0 3px rgba(154,106,47,.18);
  }
  body.theme-gray {
    --bg-main:#f1f3f5; --bg-toolbar:rgba(255,255,255,.90); --bg-header:#ffffff; --surface:#ffffff; --surface-2:#f6f7f8;
    --text-main:#22272e; --text-muted:#6b7280; --border:#d7dce2; --border-soft:#e7eaee;
    --btn-hover:#eef0f2; --input-bg:#ffffff; --page-bg:#f7f7f7; --shadow:0 18px 45px rgba(0,0,0,.08);
    --sidebar-bg:#fafafa; --sidebar-hover:#eceff2; --accent:#475569; --accent-soft:#edf0f4; --danger:#dc2626; --danger-soft:#fff1f2;
    --selection:rgba(37,99,235,.34); --page-filter:none; --page-blend:multiply; --focus:0 0 0 3px rgba(71,85,105,.16);
  }

  * { box-sizing:border-box; }
  body {
    margin:0; height:100vh; overflow:hidden; display:flex; flex-direction:column;
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Microsoft YaHei", sans-serif;
    background:linear-gradient(180deg, var(--surface-2) 0%, var(--bg-main) 44%, var(--bg-main) 100%);
    color:var(--text-main); transition:background .18s,color .18s;
    -webkit-font-smoothing:antialiased; text-rendering:geometricPrecision;
  }
  button, select, input { font:inherit; }
  button:focus-visible, select:focus-visible, input:focus-visible { outline:none; box-shadow:var(--focus); }

  .toolbar {
    min-height:56px; padding:10px 14px; display:flex; align-items:center; flex-wrap:wrap; gap:10px;
    background:var(--bg-toolbar); border-bottom:1px solid var(--border); z-index:100; backdrop-filter:saturate(180%) blur(16px);
  }
  .brand { display:flex; flex-direction:column; gap:1px; padding:0 6px 0 2px; min-width:128px; }
  .brand-title { font-size:14px; font-weight:760; letter-spacing:-.02em; line-height:1.1; }
  .brand-subtitle { font-size:11px; color:var(--text-muted); line-height:1.2; }
  .toolbar-group { display:flex; align-items:center; gap:6px; padding:4px; border:1px solid var(--border-soft); border-radius:999px; background:rgba(255,255,255,.42); }
  .project-status { font-size:12px; color:var(--text-muted); padding:0 6px; max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .toggle-label { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-muted); padding:0 4px; user-select:none; white-space:nowrap; }
  .toggle-label input { accent-color:var(--accent); }
  body.theme-dark .toolbar-group { background:rgba(255,255,255,.03); }
  .toolbar button, .toolbar select, .mini-btn {
    height:30px; padding:0 11px; border-radius:999px; border:1px solid transparent; background:transparent; color:var(--text-main);
    font-size:12px; cursor:pointer; transition:background .14s,border-color .14s,box-shadow .14s,transform .12s,opacity .14s; white-space:nowrap;
  }
  .toolbar button:hover:not(:disabled), .toolbar select:hover, .mini-btn:hover:not(:disabled) { background:var(--btn-hover); border-color:var(--border); }
  .toolbar button.icon-btn { width:30px; min-width:30px; padding:0; display:inline-grid; place-items:center; font-size:14px; font-weight:760; line-height:1; }
  .quick-nav { gap:3px; }
  .quick-nav .icon-btn[disabled] { opacity:.32; }
  .toolbar-menu { position:relative; }
  .toolbar-menu summary { list-style:none; height:30px; padding:0 12px; border-radius:999px; border:1px solid transparent; display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; user-select:none; white-space:nowrap; }
  .toolbar-menu summary::-webkit-details-marker { display:none; }
  .toolbar-menu summary::after { content:"⌄"; font-size:11px; color:var(--text-muted); transform:translateY(-1px); }
  .toolbar-menu[open] summary, .toolbar-menu summary:hover { background:var(--btn-hover); border-color:var(--border); }
  .toolbar-popover { position:absolute; top:calc(100% + 8px); left:0; min-width:230px; padding:10px; border:1px solid var(--border); border-radius:16px; background:var(--surface); box-shadow:0 22px 60px rgba(15,23,42,.18); display:flex; flex-direction:column; gap:8px; z-index:500; }
  body.theme-dark .toolbar-popover { box-shadow:0 24px 70px rgba(0,0,0,.46); }
  .toolbar-popover.right { left:auto; right:0; }
  .toolbar-popover .menu-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .toolbar-popover button, .toolbar-popover select { border-color:var(--border); background:transparent; }
  .toolbar-popover .menu-label { font-size:11px; color:var(--text-muted); padding:0 4px; }
  .color-palette { display:flex; align-items:center; gap:5px; padding:2px 3px; border-radius:999px; border:1px solid var(--border-soft); background:var(--surface); }
  .color-swatch { width:22px!important; height:22px!important; min-width:22px!important; padding:0!important; border-radius:999px!important; border:1px solid rgba(15,23,42,.14)!important; box-shadow:inset 0 0 0 2px rgba(255,255,255,.58); }
  .color-swatch.active { outline:2px solid var(--accent); outline-offset:2px; }
  .color-swatch[data-color="yellow"] { background:#fde047!important; }
  .color-swatch[data-color="green"] { background:#86efac!important; }
  .color-swatch[data-color="blue"] { background:#93c5fd!important; }
  .color-swatch[data-color="pink"] { background:#f9a8d4!important; }
  .color-swatch[data-color="purple"] { background:#c4b5fd!important; }
  .compact-label { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); white-space:nowrap; }
  .toolbar button:active:not(:disabled), .mini-btn:active:not(:disabled) { transform:translateY(1px); }
  .toolbar button:disabled, .mini-btn:disabled { opacity:.36; cursor:not-allowed; }
  .btn-primary { background:var(--accent)!important; border-color:var(--accent)!important; color:#fff!important; font-weight:700; box-shadow:0 8px 22px rgba(37,99,235,.20); }
  body.theme-dark .btn-primary { color:#07111f!important; box-shadow:0 10px 28px rgba(96,165,250,.18); }
  .btn-active { background:var(--accent-soft)!important; border-color:var(--accent)!important; color:var(--accent)!important; font-weight:700; }
  .btn-danger:hover { background:var(--danger-soft)!important; border-color:var(--danger)!important; color:var(--danger)!important; }
  .divider { width:1px; height:22px; background:var(--border); margin:0 2px; flex:0 0 auto; opacity:.8; }
  #fileListHint, #memoryHint, #memoryStats { color:var(--text-muted); font-size:12px; max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #memoryHint { color:var(--accent); display:none; }
  #memoryStats { margin-left:auto; padding:0 4px; }
  .zoom-group { display:flex; align-items:center; gap:2px; border:1px solid var(--border); border-radius:999px; padding:2px 3px; background:var(--surface); }
  .zoom-group .mini-btn { height:24px; min-width:24px; padding:0 7px; }
  .data-input {
    width:42px; height:24px; padding:0 3px; border:0; border-radius:999px; background:transparent; color:var(--text-main);
    text-align:center; font-size:12px; font-weight:720;
  }
  input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  input[type="number"] { -moz-appearance:textfield; }

  #viewer-container { flex:1; display:flex; min-height:0; width:100%; overflow:hidden; gap:12px; padding:12px; background:transparent; }
  .empty-state {
    margin:auto; width:min(520px, calc(100% - 32px)); padding:38px 36px; color:var(--text-muted); text-align:center; line-height:1.8; font-size:14px;
    border:1px solid var(--border); border-radius:24px; background:var(--surface); box-shadow:var(--shadow);
  }
  .empty-state .empty-mark { width:54px; height:54px; margin:0 auto 14px; border-radius:18px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); font-weight:800; font-size:22px; }
  .empty-state .empty-title { margin-bottom:6px; color:var(--text-main); font-size:18px; font-weight:780; letter-spacing:-.02em; }
  .empty-state .empty-desc { font-size:13px; }

  .panel-wrapper {
    flex:1 1 0; min-width:280px; display:flex; flex-direction:column; overflow:hidden; background:var(--surface);
    border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow);
  }
  .panel-wrapper.loading .pdf-panel { opacity:0; }
  .panel-wrapper.loading .panel-body { position:relative; }
  .panel-wrapper.loading .panel-body::after {
    content:"正在加载 PDF…"; position:absolute; inset:0; display:grid; place-items:center;
    color:var(--text-muted); font-size:13px; background:var(--surface-2); z-index:2;
  }
  .panel-wrapper:last-child { border-right:1px solid var(--border); }
  .panel-header {
    min-height:44px; padding:7px 9px; display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--bg-header); border-bottom:1px solid var(--border-soft); z-index:50;
  }
  .header-left { display:flex; align-items:center; gap:7px; flex:1 1 auto; min-width:0; }
  .drag-handle { cursor:grab; color:var(--text-muted); padding:0 6px; user-select:none; font-size:15px; border-radius:999px; }
  .drag-handle:hover { background:var(--btn-hover); color:var(--text-main); }
  .drag-handle:active { cursor:grabbing; color:var(--accent); }
  .panel-title { font-size:12.5px; font-weight:760; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; letter-spacing:-.01em; }
  .panel-controls { display:flex; align-items:center; gap:4px; color:var(--text-muted); flex:0 0 auto; }
  .panel-controls .divider { height:18px; margin:0 3px; }
  .mini-btn { height:26px; padding:0 9px; font-size:11.5px; border:1px solid var(--border); background:var(--surface); }
  .mini-btn.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:700; }
  .btn-close { width:26px; height:26px; border:none; border-radius:999px; background:transparent; color:var(--text-muted); font-size:16px; cursor:pointer; padding:0; display:grid; place-items:center; }
  .btn-close:hover { color:var(--danger); background:var(--danger-soft); }

  .panel-body { flex:1; min-height:0; display:flex; overflow:hidden; background:var(--surface-2); }
  .panel-sidebar {
    width:250px; flex:0 0 250px; display:none; flex-direction:column; overflow:hidden; background:var(--sidebar-bg); border-right:1px solid var(--border-soft); font-size:12px;
  }
  .sidebar-tabs { display:flex; gap:4px; padding:8px; border-bottom:1px solid var(--border-soft); flex:0 0 auto; overflow-x:auto; }
  .sidebar-tabs::-webkit-scrollbar { height: 0; }
  .sidebar-tab { flex:1; min-width:40px; height:30px; padding:0 8px; color:var(--text-muted); background:transparent; border:1px solid transparent; border-radius:999px; cursor:pointer; font-size:12px; }
  .sidebar-tab:hover { background:var(--btn-hover); }
  .sidebar-tab.active { color:var(--accent); font-weight:760; border-color:var(--accent); background:var(--accent-soft); }
  .sidebar-content { flex:1; min-height:0; overflow:auto; padding:10px; scrollbar-gutter:stable; }
  ul.toc-list { list-style:none; margin:0; padding-left:10px; }
  ul.toc-list > li { margin:3px 0; }
  .toc-link { display:block; padding:6px 8px; color:var(--text-main); text-decoration:none; border-radius:10px; line-height:1.36; cursor:pointer; }
  .toc-link:hover { background:var(--sidebar-hover); color:var(--accent); }
  .search-box { display:flex; gap:6px; margin-bottom:10px; }
  .search-input { min-width:0; flex:1; height:34px; padding:0 11px; border:1px solid var(--border); border-radius:12px; outline:none; background:var(--input-bg); color:var(--text-main); font-size:12px; }
  .search-input:focus { border-color:var(--accent); box-shadow:var(--focus); }
  .search-result-item { padding:9px 8px; border:1px solid transparent; border-bottom-color:var(--border-soft); border-radius:12px; cursor:pointer; line-height:1.45; word-break:break-word; }
  .search-result-item:hover { background:var(--sidebar-hover); border-color:var(--border-soft); }
  .search-result-item b { color:var(--accent); }

  .pdf-panel { flex:1; min-width:0; overflow:auto; padding:24px 0; position:relative; scroll-behavior:auto; background:linear-gradient(180deg,var(--surface-2),var(--bg-main)); scrollbar-gutter:stable; }
  .page-wrapper {
    position:relative; margin:0 auto 18px auto; display:flex; align-items:center; justify-content:center; overflow:hidden;
    background:var(--page-bg); border:1px solid rgba(148,163,184,.18); border-radius:6px; box-shadow:0 10px 28px rgba(15,23,42,.12); color:var(--text-muted); font-size:12px;
  }
  body.theme-dark .page-wrapper { box-shadow:0 16px 32px rgba(0,0,0,.32); border-color:rgba(148,163,184,.12); }
  .page-placeholder { user-select:none; color:var(--text-muted); opacity:.72; }
  .page-content { position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; mix-blend-mode:var(--page-blend); }
  .page-wrapper canvas { display:block; filter:var(--page-filter); mix-blend-mode:normal; image-rendering:auto; backface-visibility:hidden; }
  .textLayer { position:absolute; inset:0; overflow:hidden; transform-origin:0 0; z-index:6; }
  .textLayer ::selection { background:var(--selection)!important; color:transparent!important; }
  .pdf-link { position:absolute; z-index:20; border-radius:4px; transition:background .12s, box-shadow .12s; }
  .pdf-link:hover { background:rgba(37,99,235,.14); box-shadow:0 0 0 1px rgba(37,99,235,.26) inset; }
  .search-hit-layer { position:absolute; inset:0; z-index:9; pointer-events:none; }
  .search-hit {
    position:absolute; border-radius:4px;
    background:rgba(255, 221, 51, .62);
    outline:3px solid rgba(245, 158, 11, .96);
    box-shadow:0 0 0 4px rgba(245, 158, 11, .18), 0 8px 20px rgba(245, 158, 11, .22);
    mix-blend-mode:multiply;
    animation:searchHitPulse 1.15s ease-in-out 0s 3;
  }
  body.theme-dark .search-hit { mix-blend-mode:screen; background:rgba(250, 204, 21, .38); outline-color:rgba(251, 191, 36, .95); }
  @keyframes searchHitPulse {
    0%, 100% { transform:scale(1); opacity:.92; }
    50% { transform:scale(1.025); opacity:1; }
  }
  .toast {
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(8px); padding:10px 14px; border-radius:999px;
    background:rgba(15,23,42,.88); color:#fff; font-size:13px; z-index:999; opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; box-shadow:0 16px 40px rgba(0,0,0,.22); backdrop-filter:blur(10px);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .notes-actions { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
  .notes-actions .mini-btn { height:28px; }
  .note-search-input { width:100%; height:34px; padding:0 11px; margin-bottom:10px; border:1px solid var(--border); border-radius:12px; outline:none; background:var(--input-bg); color:var(--text-main); font-size:12px; }
  .note-search-input:focus { border-color:var(--accent); box-shadow:var(--focus); }
  .notes-list { display:flex; flex-direction:column; gap:8px; }
  .note-item { padding:9px 9px; border:1px solid var(--border-soft); border-radius:12px; background:var(--surface); cursor:pointer; line-height:1.42; }
  .note-item:hover { background:var(--sidebar-hover); border-color:var(--border); }
  .note-item.active-note {
    border-color:var(--accent);
    background:var(--accent-soft);
    box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 16%, transparent);
  }
  .note-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; font-size:11px; color:var(--text-muted); }
  .note-type { color:var(--accent); font-weight:760; display:inline-flex; align-items:center; gap:5px; }
  .note-color-dot { width:9px; height:9px; border-radius:999px; display:inline-block; border:1px solid rgba(15,23,42,.16); }
  .note-title { font-size:12px; color:var(--text-main); font-weight:720; margin-bottom:3px; word-break:break-word; }
  .note-locator { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:6px; font-size:11px; color:var(--text-muted); }
  .note-chip { display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-weight:760; }
  .note-excerpt-label { margin-top:6px; margin-bottom:3px; font-size:11px; color:var(--text-muted); font-weight:760; }
  .note-quote { padding:6px 8px; border-radius:10px; background:rgba(148,163,184,.10); color:var(--text-muted); font-size:11.5px; line-height:1.45; word-break:break-word; }
  .note-body { font-size:12px; color:var(--text-main); word-break:break-word; max-height:180px; overflow:auto; padding:7px 8px; border-radius:10px; background:var(--surface-2); }
  .note-body:empty::before { content:"（空批注）"; color:var(--text-muted); }
  .markdown-body { line-height:1.55; color:inherit; }
  .markdown-body p { margin:0 0 6px; }
  .markdown-body p:last-child { margin-bottom:0; }
  .markdown-body ul, .markdown-body ol { margin:4px 0 8px 18px; padding:0; }
  .markdown-body li { margin:2px 0; }
  .markdown-body blockquote { margin:6px 0; padding:4px 8px; border-left:3px solid var(--border); background:var(--surface-2); border-radius:8px; }
  .markdown-body code { padding:1px 5px; border-radius:6px; background:var(--surface-2); color:var(--text-main); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.92em; }
  .markdown-body pre { margin:6px 0; padding:8px; border-radius:10px; background:var(--surface-2); overflow:auto; }
  .markdown-body pre code { padding:0; background:transparent; }
  .markdown-body a { color:var(--accent); text-decoration:none; }
  .markdown-body a:hover { text-decoration:underline; }
  .markdown-body .katex-display { margin:.55em 0; overflow-x:auto; overflow-y:hidden; padding:2px 0; }
  .markdown-body .katex { color:var(--text-main); }
  .markdown-body .math-error { color:var(--danger); font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

  .panel-wrapper { position:relative; }
  .panel-resizer {
    position:absolute; top:0; width:14px; height:100%;
    cursor:col-resize; z-index:80; touch-action:none;
  }
  .panel-resizer-right { right:-7px; }
  .panel-resizer-left { left:-7px; }
  .panel-resizer::after {

<body class="theme-normal">
<div class="toolbar">

        <div class="menu-row"><button id="btnSaveProject" title="把当前打开的 PDF、锚点和阅读进度保存到浏览器暂存区">保存暂存</button><button id="btnRestorePersist" title="打开浏览器本地暂存的项目">打开暂存</button></div>
        <div class="menu-row"><button id="btnExportProject" title="弹出另存为窗口，手动选择 .readerproj 项目文件保存位置；不支持时自动回退为浏览器下载">导出项目</button><button id="btnImportProject" title="从 .prproj / .readerproj 项目文件恢复文档、锚点和阅读进度">导入项目</button></div>

<script>
(() => {
  'use strict';

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const app = {
    files: [],
    docs: [],
    anchors: [],

    syncing: false,
    userActiveDocId: null,

    saveTimer: 0,

    notes: []
  };

  function uid() {
    return `doc_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function smoothstep(edge0, edge1, x) {
    const t = clamp((x - edge0) / Math.max(0.0001, edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>'"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c]));
  }

  function escapeRegExp(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function findSearchMatchInfo(textItems, matchIdx, queryLength, viewport) {
    let offset = 0;

    for (let itemIndex = 0; itemIndex < textItems.length; itemIndex++) {
      const item = textItems[itemIndex];
      const str = String(item.str || '');
      const start = offset;
      const end = start + str.length;

      if (matchIdx >= start && matchIdx <= end && str.trim()) {
        const localStart = clamp(matchIdx - start, 0, Math.max(0, str.length - 1));
        const localLen = Math.max(1, Math.min(queryLength, Math.max(1, str.length - localStart)));

        try {
          const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
          const itemWidth = Math.max(1, Number(item.width || 0));
          const itemHeight = Math.max(6, Number(item.height || 12));
          const x = tx[4] + itemWidth * (localStart / Math.max(1, str.length));
          const y = tx[5] - itemHeight;
          const w = Math.max(8, itemWidth * (localLen / Math.max(1, str.length)));
          const h = itemHeight * 1.32;

          const rect = {
            x: clamp(x / Math.max(1, viewport.width), 0, 0.999),
            y: clamp(y / Math.max(1, viewport.height), 0, 0.999),
            w: clamp(w / Math.max(1, viewport.width), 0.006, 1),
            h: clamp(h / Math.max(1, viewport.height), 0.006, 1)
          };

          return {
            pagePct: clamp((rect.y + rect.h / 2), 0, 0.999),
            rect,
            itemIndex,
            localStart,
            localLen,
            itemTextLength: Math.max(1, str.length)
          };
        } catch (_) {
          return { pagePct: null, rect: null, itemIndex, localStart, localLen, itemTextLength: Math.max(1, str.length) };
        }
      }

      offset += str.length + 1;
    }

    return { pagePct: null, rect: null, itemIndex: -1, localStart: 0, localLen: 0, itemTextLength: 1 };
  }

  function scrollDocToSearchMatch(doc, pageIndex, matchInfo = {}, syncAfter = false) {
    const idx = clamp(pageIndex, 0, Math.max(0, doc.pages.length - 1));
    const el = doc.pages[idx]?.el;
    if (!el) return;

    const pendingHit = {
      pageIndex: idx,
      rect: matchInfo.rect || null,
      pagePct: matchInfo.pagePct ?? 0.5,
      itemIndex: Number.isFinite(matchInfo.itemIndex) ? matchInfo.itemIndex : -1,
      localStart: matchInfo.localStart || 0,
      localLen: matchInfo.localLen || 0,
      itemTextLength: matchInfo.itemTextLength || 1,
      createdAt: Date.now(),
      recentered: false
    };

    const exactRect = getExactSearchRectFromTextLayer(doc, idx, pendingHit);
    if (exactRect) pendingHit.rect = exactRect;

    const rect = pendingHit.rect || null;
    const pagePct = pendingHit.pagePct ?? 0.5;
    const yInPage = rect
      ? (rect.y + rect.h / 2) * el.offsetHeight
      : clamp(pagePct, 0, 0.999) * el.offsetHeight;

    const targetY = el.offsetTop + yInPage - doc.scroller.clientHeight / 2;
    doc.scroller.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
    updateIndicator(doc);

    doc.searchHit = pendingHit;
    scheduleRenderAround(doc);
    renderSearchHitForPage(doc, idx);

    clearTimeout(doc.searchHitTimer);
    doc.searchHitTimer = setTimeout(() => {
      if (doc.searchHit?.pageIndex === idx) doc.searchHit = null;
      doc.pages[idx]?.el?.querySelector('.search-hit-layer')?.remove();
    }, 9000);

    scheduleWorkspaceSave();
    if (syncAfter) {
      setTimeout(() => performSync(doc), 120);
    }
  }


  function getExactSearchRectFromTextLayer(doc, pageIndex, hit) {
    const pageState = doc.pages[pageIndex];
    const content = pageState?.el?.querySelector('.page-content');
    const textDivs = pageState?.textDivs;
    if (!content || !textDivs || hit.itemIndex < 0 || !textDivs[hit.itemIndex]) return null;

    const div = textDivs[hit.itemIndex];
    const contentBox = content.getBoundingClientRect();
    const box = div.getBoundingClientRect();
    if (!contentBox.width || !contentBox.height || !box.width || !box.height) return null;

    const startRatio = clamp(hit.localStart / Math.max(1, hit.itemTextLength), 0, 0.98);
    const lenRatio = clamp(hit.localLen / Math.max(1, hit.itemTextLength), 0.02, 1);
    const xPx = (box.left - contentBox.left) + box.width * startRatio;
    const yPx = box.top - contentBox.top;
    const wPx = Math.max(8, box.width * lenRatio);
    const hPx = Math.max(8, box.height);

    return {
      x: clamp(xPx / contentBox.width, 0, 0.999),
      y: clamp(yPx / contentBox.height, 0, 0.999),
      w: clamp(wPx / contentBox.width, 0.006, 1),
      h: clamp(hPx / contentBox.height, 0.006, 1)
    };
  }

  function recenterSearchHit(doc, pageIndex, rect) {
    const hit = doc.searchHit;
    if (!hit || hit.pageIndex !== pageIndex || hit.recentered) return;
    if (Date.now() - hit.createdAt > 3500) return;

    const el = doc.pages[pageIndex]?.el;
    if (!el) return;

    const yInPage = (rect.y + rect.h / 2) * el.offsetHeight;
    const targetY = Math.max(0, el.offsetTop + yInPage - doc.scroller.clientHeight / 2);

    if (Math.abs(doc.scroller.scrollTop - targetY) > 18) {
      doc.scroller.scrollTo({ top: targetY, behavior: 'smooth' });
    }
    hit.recentered = true;
  }

  function centerSearchHitElement(doc, element, hit) {
    if (!doc || !element || !hit) return;
    if (hit.centeredAt && Date.now() - hit.centeredAt < 800) return;

    requestAnimationFrame(() => {
      try {
        element.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
        hit.centeredAt = Date.now();
      } catch (_) {
        const pageState = doc.pages[hit.pageIndex];
        const el = pageState?.el;
        if (!el) return;
        const r = hit.rect || { y: hit.pagePct ?? 0.5, h: 0.02 };
        const yInPage = (r.y + r.h / 2) * el.offsetHeight;
        doc.scroller.scrollTo({ top: Math.max(0, el.offsetTop + yInPage - doc.scroller.clientHeight / 2), behavior: 'smooth' });
        hit.centeredAt = Date.now();
      }
    });
  }

  function renderSearchHitForPage(doc, pageIndex) {
    const hit = doc.searchHit;
    const pageState = doc.pages[pageIndex];
    if (!hit || hit.pageIndex !== pageIndex || !pageState?.loaded) return;

    const content = pageState.el.querySelector('.page-content');
    if (!content) return;
    content.querySelector('.search-hit-layer')?.remove();

    const exactRect = getExactSearchRectFromTextLayer(doc, pageIndex, hit);
    const r = exactRect || hit.rect || { x: 0.12, y: 0.45, w: 0.76, h: 0.055 };

    if (exactRect) {
      hit.rect = exactRect;
    }

    const layer = document.createElement('div');
    layer.className = 'search-hit-layer';

    const div = document.createElement('div');
    div.className = 'search-hit';
    div.style.left = `${r.x * 100}%`;
    div.style.top = `${r.y * 100}%`;
    div.style.width = `${Math.max(0.02, r.w) * 100}%`;
    div.style.height = `${Math.max(0.012, r.h) * 100}%`;

    layer.appendChild(div);
    content.appendChild(layer);

    if (hit.shouldCenter !== false) {
      centerSearchHitElement(doc, div, hit);
    }
  }

  function renderLatex(src, displayMode = false) {
    const latex = String(src || '').trim();
    if (!latex) return '';
    if (window.katex?.renderToString) {
      try {
        return window.katex.renderToString(latex, {
          displayMode,
          throwOnError: false,
          strict: 'ignore',
          trust: false,
          output: 'html'
        });
      } catch (err) {
        return `<span class="math-error">${escapeHtml(latex)}</span>`;
      }
    }
    return `<span class="math-error">${escapeHtml(displayMode ? `$$${latex}$$` : `$${latex}$`)}</span>`;
  }

  function renderInlineText(raw) {
    let s = escapeHtml(raw || '');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    s = s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    return s;
  }

  function renderMarkdownInline(raw) {
    const input = String(raw || '');
    const out = [];
    let i = 0;
    let buffer = '';

    const flush = () => {
      if (buffer) {
        out.push(renderInlineText(buffer));
        buffer = '';
      }
    };

    while (i < input.length) {
      if (input.startsWith('\\(', i)) {
        const end = input.indexOf('\\)', i + 2);
        if (end !== -1) {
          flush();
          out.push(renderLatex(input.slice(i + 2, end), false));
          i = end + 2;
          continue;
        }
      }

      if (input[i] === '$' && input[i + 1] !== '$') {
        const end = input.indexOf('$', i + 1);
        if (end !== -1) {
          const expr = input.slice(i + 1, end);
          if (expr.trim()) {
            flush();
            out.push(renderLatex(expr, false));
            i = end + 1;
            continue;
          }
        }
      }

      buffer += input[i];
      i++;
    }

    flush();
    return out.join('');
  }

  function renderMarkdown(raw) {
    const text = String(raw || '').replace(/\r\n/g, '\n').trim();
    if (!text) return '';
    const lines = text.split('\n');
    const out = [];
    let inCode = false;
    let code = [];
    let list = null;
    let inMath = false;
    let math = [];

    const closeList = () => {
      if (list) {
        out.push(`<${list.type}>${list.items.map(item => `<li>${renderMarkdownInline(item)}</li>`).join('')}</${list.type}>`);
        list = null;
      }
    };

    const closeCode = () => {
      if (inCode) {
        out.push(`<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`);
        code = [];
        inCode = false;
      }
    };

    const closeMath = () => {
      if (inMath) {
        out.push(renderLatex(math.join('\n'), true));
        math = [];
        inMath = false;
      }
    };

    for (const line of lines) {
      const trimmed = line.trim();

      if (/^\s*```/.test(line)) {
        if (inMath) { math.push(line); continue; }
        if (inCode) closeCode();
        else { closeList(); inCode = true; code = []; }
        continue;
      }
      if (inCode) { code.push(line); continue; }

      if (trimmed === '$$' || trimmed === '\\[' || trimmed === '\\]') {
        closeList();
        if (inMath) closeMath();
        else { inMath = true; math = []; }
        continue;
      }

      if (trimmed.startsWith('$$') && trimmed.endsWith('$$') && trimmed.length > 4) {
        closeList();
        out.push(renderLatex(trimmed.slice(2, -2), true));
        continue;
      }

      if (trimmed.startsWith('\\[') && trimmed.endsWith('\\]') && trimmed.length > 4) {
        closeList();
        out.push(renderLatex(trimmed.slice(2, -2), true));
        continue;
      }

      if (inMath) {
        math.push(line);
        continue;
      }

      if (!trimmed) {
        closeList();
        continue;
      }

      const heading = /^(#{1,4})\s+(.+)$/.exec(line);
      if (heading) {
        closeList();
        const level = Math.min(4, heading[1].length);
        out.push(`<h${level}>${renderMarkdownInline(heading[2])}</h${level}>`);
        continue;
      }

      const quote = /^>\s?(.+)$/.exec(line);
      if (quote) {
        closeList();
        out.push(`<blockquote>${renderMarkdownInline(quote[1])}</blockquote>`);
        continue;
      }

      const ul = /^[-*]\s+(.+)$/.exec(line);
      const ol = /^\d+\.\s+(.+)$/.exec(line);
      if (ul || ol) {
        const type = ul ? 'ul' : 'ol';
        if (!list || list.type !== type) {
          closeList();
          list = { type, items: [] };
        }
        list.items.push((ul || ol)[1]);
        continue;
      }

      closeList();
      out.push(`<p>${renderMarkdownInline(line)}</p>`);
    }

    closeMath();
    closeCode();
    closeList();
    return out.join('');
  }

  function safeRenderMarkdown(raw) {
    try {
      const html = renderMarkdown(raw);
      return html || '';
    } catch (err) {
      console.warn('Markdown render failed:', err);
      return `<p>${escapeHtml(raw || '')}</p>`;
    }
  }

  function makeNoteId() {
    return `note_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  const HIGHLIGHT_COLORS = {
    yellow: 'rgba(253, 224, 71, 0.40)',
    green: 'rgba(134, 239, 172, 0.36)',
    blue: 'rgba(147, 197, 253, 0.34)',
    pink: 'rgba(249, 168, 212, 0.36)',
    purple: 'rgba(196, 181, 253, 0.36)'
  };

  const HIGHLIGHT_DOT_COLORS = {
    yellow: '#fde047', green: '#86efac', blue: '#93c5fd', pink: '#f9a8d4', purple: '#c4b5fd'
  };

  function normalizeHighlightColor(color) {
    return Object.hasOwn(HIGHLIGHT_COLORS, color) ? color : 'yellow';
  }

  function getHighlightColorValue(color) {
    return HIGHLIGHT_COLORS[normalizeHighlightColor(color)];
  }

  function setHighlightColor(color) {
    app.highlightColor = normalizeHighlightColor(color);
    els.highlightColorSwatches.forEach(btn => btn.classList.toggle('active', btn.dataset.color === app.highlightColor));
    scheduleWorkspaceSave();
  }

  function fileKey(file) {
    if (!file) return '';
    return `${file.name || ''}::${file.size || 0}::${file.lastModified || 0}`;
  }

  function docKey(doc) {
    return fileKey(doc?.file);
  }

  function sanitizeNotes(notes) {
    if (!Array.isArray(notes)) return [];
    return notes
      .filter(n => n && typeof n === 'object' && (n.type === 'page-note' || n.type === 'highlight'))
      .map(n => ({
        id: String(n.id || makeNoteId()),
        type: n.type,
        docKey: String(n.docKey || ''),
        docName: String(n.docName || ''),
        docSize: Number(n.docSize || 0),
        docLastModified: Number(n.docLastModified || 0),
        pageIndex: Math.max(0, Number(n.pageIndex || 0)),
        text: String(n.text || ''),
        note: String(n.note || ''),
        color: normalizeHighlightColor(String(n.color || 'yellow')),
        groups: Array.isArray(n.groups) ? n.groups.map(String).filter(Boolean) : [],
        rects: Array.isArray(n.rects) ? n.rects.map(r => ({
          pageIndex: Math.max(0, Number(r.pageIndex || 0)),
          x: clamp(Number(r.x || 0), 0, 1),
          y: clamp(Number(r.y || 0), 0, 1),
          w: clamp(Number(r.w || 0), 0, 1),
          h: clamp(Number(r.h || 0), 0, 1)
        })).filter(r => r.w > 0 && r.h > 0) : [],
        createdAt: Number(n.createdAt || Date.now()),
        updatedAt: Number(n.updatedAt || n.createdAt || Date.now())
      }));
  }

  function getAllExistingGroups() {
    const groups = new Set();
    app.notes.forEach(n => n.groups?.forEach(g => groups.add(g)));
    return Array.from(groups).sort();
  }

  function noteMatchesDoc(note, doc) {
    if (!note || !doc?.file) return false;
    const key = docKey(doc);
    if (note.docKey && note.docKey === key) return true;
    if (note.docName === doc.file.name && (!note.docSize || note.docSize === (doc.file.size || 0))) return true;
    return false;
  }

  function getDocNotes(doc) {
    return app.notes.filter(n => noteMatchesDoc(n, doc));
  }

  function getActiveDoc() {
    return app.docs.find(d => d.id === app.userActiveDocId) || app.docs[0] || null;
  }

  function getSelectionRange() {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || !String(sel.toString() || '').trim()) return null;
    return sel.getRangeAt(0);
  }

  function findDocForSelection(range) {
    if (!range) return null;

    const byNode = app.docs.find(doc => doc.wrapper.contains(range.commonAncestorContainer));
    if (byNode) return byNode;

    const rects = Array.from(range.getClientRects()).filter(r => r.width > 1 && r.height > 1);
    if (!rects.length) return null;

    const scores = new Map(app.docs.map(doc => [doc.id, 0]));
    for (const rect of rects) {
      for (const doc of app.docs) {
        const box = doc.wrapper.getBoundingClientRect();
        const xOverlap = Math.max(0, Math.min(rect.right, box.right) - Math.max(rect.left, box.left));
        const yOverlap = Math.max(0, Math.min(rect.bottom, box.bottom) - Math.max(rect.top, box.top));
        scores.set(doc.id, scores.get(doc.id) + xOverlap * yOverlap);
      }
    }

    let bestDoc = null;
    let bestScore = 0;
    for (const doc of app.docs) {
      const score = scores.get(doc.id) || 0;
      if (score > bestScore) {
        bestScore = score;
        bestDoc = doc;
      }
    }
    return bestScore > 0 ? bestDoc : null;
  }

  function shortText(s, len = 120) {
    const t = String(s || '').replace(/\s+/g, ' ').trim();
    return t.length > len ? `${t.slice(0, len)}…` : t;
  }

  function waitFrame() {
    return new Promise(resolve => requestAnimationFrame(resolve));
  }

  function toast(message, ms = 1800) {
    els.toast.textContent = message;
    els.toast.classList.add('show');
    clearTimeout(els.toast._timer);
    els.toast._timer = setTimeout(() => els.toast.classList.remove('show'), ms);
  }

  function openPersistentDB() {
    return new Promise((resolve, reject) => {
      if (!('indexedDB' in window)) {
        reject(new Error('当前浏览器不支持 IndexedDB，无法保存 PDF 文件。'));
        return;
      }
      let request;
      try {
        request = indexedDB.open(PERSIST_DB_NAME, PERSIST_DB_VERSION);
      } catch (err) {
        reject(err);
        return;
      }
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(PERSIST_FILES_STORE)) {
          db.createObjectStore(PERSIST_FILES_STORE, { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains(PERSIST_META_STORE)) {
          db.createObjectStore(PERSIST_META_STORE, { keyPath: 'key' });
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error('打开本地数据库失败。'));
      request.onblocked = () => reject(new Error('本地数据库被其它阅读器标签页占用，请关闭旧页面后重试。'));
    });
  }

  function transactionDone(tx) {
    return new Promise((resolve, reject) => {
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error || new Error('数据库写入失败。'));
      tx.onabort = () => reject(tx.error || new Error('数据库写入被中断。'));
    });
  }

  function requestResult(req) {
    return new Promise((resolve, reject) => {
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('数据库读取失败。'));
    });
  }

  async function readPersistentMeta() {
    let db;
    try {
      db = await openPersistentDB();
      const tx = db.transaction(PERSIST_META_STORE, 'readonly');
      const rec = await requestResult(tx.objectStore(PERSIST_META_STORE).get(PERSIST_META_KEY));
      return rec?.value || null;
    } catch (err) {
      console.warn('读取持久化信息失败:', err);
      return null;
    } finally {
      try { db?.close(); } catch (_) {}
    }
  }

  async function readPersistentFiles() {
    let db;
    try {
      db = await openPersistentDB();
      const tx = db.transaction(PERSIST_FILES_STORE, 'readonly');
      const records = await requestResult(tx.objectStore(PERSIST_FILES_STORE).getAll());
      return records.sort((a, b) => (a.order || 0) - (b.order || 0));
    } finally {
      try { db?.close(); } catch (_) {}
    }
  }

  async function writePersistentMetaOnly(state) {
    if (!state || !app.projectActive || !app.autoSaveProject) return;
    let db;
    try {
      db = await openPersistentDB();
      const tx = db.transaction(PERSIST_META_STORE, 'readwrite');
      tx.objectStore(PERSIST_META_STORE).put({ key: PERSIST_META_KEY, value: { ...state, persistedAt: Date.now() } });
      await transactionDone(tx);
    } catch (err) {
      console.warn('保存阅读状态失败:', err);
    } finally {
      try { db?.close(); } catch (_) {}
    }
  }

  async function writePersistentWorkspaceFull({ silent = false, saveFiles = app.savePdfCopy } = {}) {
    const state = getWorkspaceState();
    if (!state || !app.docs.length || app.isPersisting) return;
    app.isPersisting = true;
    updatePersistentButtons();
    let db;
    try {
      db = await openPersistentDB();
      const tx = db.transaction([PERSIST_FILES_STORE, PERSIST_META_STORE], 'readwrite');
      const filesStore = tx.objectStore(PERSIST_FILES_STORE);
      const metaStore = tx.objectStore(PERSIST_META_STORE);
      filesStore.clear();
      const fileInfos = app.docs.map((doc, order) => {
        const id = `pdf_${order}`;
        const info = { id, order, name: doc.file.name, type: doc.file.type || 'application/pdf', size: doc.file.size || 0, lastModified: doc.file.lastModified || Date.now() };
        if (saveFiles) filesStore.put({ ...info, blob: doc.file });
        return info;
      });
      metaStore.put({ key: PERSIST_META_KEY, value: { ...state, fileInfos, filesEmbedded: !!saveFiles, persistedAt: Date.now() } });
      await transactionDone(tx);
      app.projectActive = true;
      app.hasPersistentWorkspace = true;
      updatePersistentButtons();
      if (!silent) toast(saveFiles ? '项目已保存，PDF 副本也已写入数据库。' : '项目已保存：仅保存锚点、进度和文件信息。');
    } catch (err) {
      console.error('持久化保存失败:', err);
      const msg = /quota/i.test(String(err?.name || err?.message || '')) ? '浏览器存储空间不足，无法保存这些 PDF。' : `持久化保存失败：${err.message || err}`;
      toast(msg, 3600);
    } finally {
      app.isPersisting = false;
      updatePersistentButtons();
      try { db?.close(); } catch (_) {}
    }
  }

  function schedulePersistentFullSave(options = {}) {
    if (!app.projectActive || !app.autoSaveProject) return;
    clearTimeout(app.persistTimer);
    app.persistTimer = setTimeout(() => writePersistentWorkspaceFull({ silent: true, saveFiles: app.savePdfCopy, ...options }), 900);
  }

  function makeExportFileName() {
    const first = app.docs[0]?.file?.name || 'parallel-reader';
    const base = first.replace(/\.[^.]+$/, '').replace(/[\\/:*?"<>|\s]+/g, '_').slice(0, 48) || 'parallel-reader';
    const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    return `${base}_${date}.readerproj`;
  }

  function downloadBlob(blob, fileName) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1200);
  }

  async function saveBlobWithPicker(blob, fileName) {
    if (typeof window.showSaveFilePicker !== 'function') {
      downloadBlob(blob, fileName);
      return { mode: 'download-fallback' };
    }

    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{
          description: 'Parallel Reader 项目文件',
          accept: { 'application/json': ['.readerproj'] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return { mode: 'picker', name: handle.name || fileName };
    } catch (err) {
      if (err && err.name === 'AbortError') return { mode: 'cancelled' };
      console.warn('系统另存为不可用，回退到浏览器下载:', err);
      downloadBlob(blob, fileName);
      return { mode: 'download-fallback', error: err };
    }
  }

  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    let binary = '';
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  function base64ToUint8Array(base64) {
    const binary = atob(base64);
    const chunkSize = 0x8000;
    const chunks = [];
    for (let i = 0; i < binary.length; i += chunkSize) {
      const slice = binary.slice(i, i + chunkSize);
      const bytes = new Uint8Array(slice.length);
      for (let j = 0; j < slice.length; j++) bytes[j] = slice.charCodeAt(j);
      chunks.push(bytes);
    }
    const total = chunks.reduce((sum, c) => sum + c.length, 0);
    const out = new Uint8Array(total);
    let offset = 0;
    for (const c of chunks) {
      out.set(c, offset);
      offset += c.length;
    }
    return out;
  }

  async function buildPortableProjectBundle({ includeFiles = app.savePdfCopy } = {}) {
    const state = getWorkspaceState();
    if (!state || !app.docs.length) throw new Error('当前没有可导出的项目。');
    const files = [];
    for (let i = 0; i < app.docs.length; i++) {
      const doc = app.docs[i];
      const entry = {
        id: `pdf_${i}`,
        order: i,
        name: doc.file.name,
        type: doc.file.type || 'application/pdf',
        size: doc.file.size || 0,
        lastModified: doc.file.lastModified || 0
      };
      if (includeFiles) {
        entry.encoding = 'base64';
        entry.data = arrayBufferToBase64(await doc.file.arrayBuffer());
      }
      files.push(entry);
      if (i % 1 === 0) await waitFrame();
    }
    return {
      format: 'parallel-reader-project',
      version: 1,
      app: 'Parallel Reader',
      exportedAt: new Date().toISOString(),
      filesEmbedded: !!includeFiles,
      workspace: {
        ...state,
        portable: true,
        fileInfos: files.map(({ data, ...rest }) => rest),
        notes: state.notes || [],
        annotations: state.annotations || []
      },
      files
    };
  }

  async function exportProjectFile() {
    if (!app.docs.length) {
      toast('当前没有可导出的项目。');
      return;
    }
    const includeFiles = !!els.chkSavePdfCopy.checked;
    const totalBytes = app.docs.reduce((sum, d) => sum + (d.file.size || 0), 0);
    if (includeFiles && totalBytes > 180 * 1024 * 1024) {
      const mb = Math.round(totalBytes / 1024 / 1024);
      if (!confirm(`当前 PDF 总大小约 ${mb} MB。导出自包含项目文件会占用较多内存和磁盘空间，是否继续？`)) return;
    }
    app.isPersisting = true;
    updatePersistentButtons();
    try {
      const bundle = await buildPortableProjectBundle({ includeFiles });
      const blob = new Blob([JSON.stringify(bundle)], { type: 'application/json' });
      const result = await saveBlobWithPicker(blob, makeExportFileName());
      if (result.mode === 'cancelled') {
        toast('已取消导出。', 1800);
      } else if (result.mode === 'picker') {
        toast(includeFiles ? '项目文件已保存到指定位置：包含 PDF 副本。' : '项目文件已保存到指定位置：仅包含锚点、进度和文件信息。', 3000);
      } else {
        toast(includeFiles ? '当前浏览器不支持另存为，已改用下载：包含 PDF 副本。' : '当前浏览器不支持另存为，已改用下载：仅包含锚点、进度和文件信息。', 3600);
      }
    } catch (err) {
      console.error('导出项目文件失败:', err);
      toast(`导出失败：${err.message || err}`, 3600);
    } finally {
      app.isPersisting = false;
      updatePersistentButtons();
    }
  }

  function normalizeImportedBundle(raw) {
    const bundle = JSON.parse(raw);
    if (bundle?.format !== 'parallel-reader-project' || !bundle.workspace) {
      throw new Error('这不是 Parallel Reader 项目文件。');
    }
    if (!Array.isArray(bundle.files)) bundle.files = [];
    if (!Array.isArray(bundle.workspace.fileNames) && bundle.files.length) {
      bundle.workspace.fileNames = bundle.files.map(f => f.name);
    }
    if (!Array.isArray(bundle.workspace.anchors)) {
      bundle.workspace.anchors = [new Array(Math.min(bundle.files.length || 1, MAX_DOCS)).fill(0)];
    }
    bundle.workspace.notes = sanitizeNotes(bundle.workspace.notes || bundle.workspace.annotations || []);
    bundle.workspace.annotations = bundle.workspace.notes.filter(n => n.type === 'highlight');
    return bundle;
  }

  async function importProjectFile(file) {
    if (!file) return;
    app.isPersisting = true;
    updatePersistentButtons();
    try {
      const text = await file.text();
      const bundle = normalizeImportedBundle(text);
      const meta = bundle.workspace;
      app.savedWorkspace = meta;
      app.projectActive = false;
      if (meta.theme) {
        els.themeSelect.value = meta.theme;
        document.body.className = `theme-${meta.theme}`;
      }
      if (meta.highlightColor) setHighlightColor(meta.highlightColor);
      if (meta.layout) {
        app.singleDocWidth = clamp(Number(meta.layout.singleDocWidth || 92), 45, 100);
        app.singleDocAlign = ['flex-start','center','flex-end'].includes(meta.layout.singleDocAlign) ? meta.layout.singleDocAlign : 'center';
        if (els.singleWidthInput) els.singleWidthInput.value = Math.round(app.singleDocWidth);
        if (els.singleAlignSelect) els.singleAlignSelect.value = app.singleDocAlign;
      }
      if (typeof meta.autoSave === 'boolean') els.chkAutoSave.checked = meta.autoSave;
      if (typeof meta.savePdfCopy === 'boolean') els.chkSavePdfCopy.checked = meta.savePdfCopy;
      const embedded = bundle.files
        .filter(f => f?.data && f.encoding === 'base64')
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .slice(0, MAX_DOCS);

      await clearWorkspace(false);
      app.savedWorkspace = meta;
      app.notes = sanitizeNotes(meta.notes || meta.annotations || []);
      app.projectActive = false;
      updatePersistentButtons();

      if (embedded.length) {
        app.files = embedded.map(f => {
          const bytes = base64ToUint8Array(f.data);
          return new File([bytes], f.name || 'document.pdf', { type: f.type || 'application/pdf', lastModified: f.lastModified || Date.now() });
        });
        updateFileHint();
        await loadFiles({ skipFullPersist: true });
        toast('项目文件已导入。修改后请重新导出项目文件。', 3000);
      } else {
        app.files = [];
        updateFileHint();
        els.memoryHint.style.display = 'inline-block';
        els.memoryHint.textContent = `已导入项目状态：请选择【${(meta.fileNames || []).join(', ')}】再开始阅读`;
        els.memoryHint.title = '这个项目文件没有包含 PDF 副本，只保存了锚点、阅读进度和文件信息。';
        toast('项目状态已导入；请重新选择同名 PDF。', 3200);
      }
      saveWorkspaceNow();
    } catch (err) {
      console.error('导入项目文件失败:', err);
      toast(`导入失败：${err.message || err}`, 4200);
    } finally {
      app.isPersisting = false;
      updatePersistentButtons();
      if (els.projectFileInput) els.projectFileInput.value = '';
    }
  }

  async function clearPersistentStorage() {
    let db;
    try {
      db = await openPersistentDB();
      const tx = db.transaction([PERSIST_FILES_STORE, PERSIST_META_STORE], 'readwrite');
      tx.objectStore(PERSIST_FILES_STORE).clear();
      tx.objectStore(PERSIST_META_STORE).clear();
      await transactionDone(tx);
    } catch (err) {
      console.warn('清除持久化数据失败:', err);
    } finally {
      try { db?.close(); } catch (_) {}
    }
    app.hasPersistentWorkspace = false;
    app.projectActive = false;
    updatePersistentButtons();
  }

  function updatePersistentButtons() {
    if (!els.persistGroup) return;
    app.autoSaveProject = !!els.chkAutoSave?.checked;
    app.savePdfCopy = !!els.chkSavePdfCopy?.checked;
    const mode = app.projectActive ? '已保存项目' : '临时';
    const names = app.docs.length ? app.docs.map(d => d.file.name).join(', ') : '';
    els.projectStatus.textContent = app.isPersisting ? '项目：保存中…' : `项目：${mode}`;
    els.projectStatus.title = names || (app.hasPersistentWorkspace ? '浏览器中有本机暂存项目；也可以导出项目文件长期备份' : '当前不会写入浏览器暂存区；可随时导出项目文件');
    els.btnSaveProject.disabled = app.isPersisting || !app.docs.length;
    els.btnExportProject.disabled = app.isPersisting || !app.docs.length;
    els.btnImportProject.disabled = app.isPersisting;
    els.btnRestorePersist.disabled = app.isPersisting || !app.hasPersistentWorkspace;
    els.btnTempMode.disabled = app.isPersisting || !app.projectActive;
    els.btnClearPersist.disabled = app.isPersisting || !app.hasPersistentWorkspace;
  }

  async function refreshPersistentHint() {
    const meta = await readPersistentMeta();
    app.hasPersistentWorkspace = !!meta?.fileNames?.length;
    if (meta) {
      if (typeof meta.autoSave === 'boolean') els.chkAutoSave.checked = meta.autoSave;
      if (typeof meta.savePdfCopy === 'boolean') els.chkSavePdfCopy.checked = meta.savePdfCopy;
    }
    updatePersistentButtons();
    if (app.hasPersistentWorkspace && !app.files.length && !app.docs.length) {
      els.memoryHint.style.display = 'inline-block';
      els.memoryHint.textContent = meta.filesEmbedded ? `已暂存项目：${meta.fileNames.join(', ')}` : `已暂存项目状态：${meta.fileNames.join(', ')}`;
      els.memoryHint.title = meta.filesEmbedded ? '可点击“打开项目”直接恢复 PDF 和阅读状态。' : '该项目未保存 PDF 副本；打开项目后需要重新选择同名 PDF。';
    }
  }

  async function restorePersistentWorkspace() {
    const meta = await readPersistentMeta();
    if (!meta?.fileNames?.length) {
      toast('没有找到已保存的项目。');
      return;
    }
    try {
      app.savedWorkspace = meta;
      app.notes = sanitizeNotes(meta.notes || meta.annotations || []);
      app.hasPersistentWorkspace = true;
      app.projectActive = true;
      if (typeof meta.autoSave === 'boolean') els.chkAutoSave.checked = meta.autoSave;
      if (typeof meta.savePdfCopy === 'boolean') els.chkSavePdfCopy.checked = meta.savePdfCopy;
      updatePersistentButtons();
      const records = await readPersistentFiles();
      const usableRecords = records.filter(r => r.blob).slice(0, MAX_DOCS);
      if (!usableRecords.length) {
        await clearWorkspace(false);
        els.memoryHint.style.display = 'inline-block';
        els.memoryHint.textContent = `项目已打开：请选择【${meta.fileNames.join(', ')}】再开始阅读`;
        els.memoryHint.title = '该项目只保存了锚点、阅读进度和文件信息，没有保存 PDF 副本。';
        toast('项目状态已打开；请重新选择同名 PDF。', 3200);
        return;
      }
      await clearWorkspace(false);
      app.files = usableRecords.map(rec => new File([rec.blob], rec.name, { type: rec.type || 'application/pdf', lastModified: rec.lastModified || Date.now() }));
      updateFileHint();
      await loadFiles({ skipFullPersist: true });
      toast('项目已恢复。');
    } catch (err) {
      console.error('恢复持久化项目失败:', err);
      toast(`恢复失败：${err.message || err}`, 3600);
    }
  }

  function loadWorkspaceMeta() {
    try {
      app.savedWorkspace = JSON.parse(localStorage.getItem(WORKSPACE_KEY) || 'null');
    } catch (_) {
      app.savedWorkspace = null;
    }
    const ws = app.savedWorkspace;
    if (ws?.notes || ws?.annotations) app.notes = sanitizeNotes(ws.notes || ws.annotations || []);
    if (ws?.theme) {
      els.themeSelect.value = ws.theme;
      document.body.className = `theme-${ws.theme}`;
    }
    if (ws?.highlightColor) setHighlightColor(ws.highlightColor);
    if (ws?.layout) {
      app.singleDocWidth = clamp(Number(ws.layout.singleDocWidth || 92), 45, 100);
      app.singleDocAlign = ['flex-start','center','flex-end'].includes(ws.layout.singleDocAlign) ? ws.layout.singleDocAlign : 'center';
      if (els.singleWidthInput) els.singleWidthInput.value = Math.round(app.singleDocWidth);
      if (els.singleAlignSelect) els.singleAlignSelect.value = app.singleDocAlign;
    }
    if (ws?.fileNames?.length) {
      els.memoryHint.style.display = 'inline-block';
      els.memoryHint.textContent = `上次：选择【${ws.fileNames.join(', ')}】可恢复状态`;
      els.memoryHint.title = '如果没有持久化 PDF 数据，浏览器仍需要你重新选择同名文件。';
    }
  }

  function getWorkspaceState() {
    if (!app.docs.length) return null;
    const scroll = app.docs[0] ? getPanelScrollState(app.docs[0]) : { index: 0, pct: 0 };
    const docStates = app.docs.map(d => ({
      name: d.file.name,
      size: d.file.size || 0,
      lastModified: d.file.lastModified || 0,
      zoom: d.zoom,
      scroll: getPanelScrollState(d),
      sidebarOpen: d.sidebar?.classList.contains('open') || false,
      flexWeight: d.flexWeight || 1
    }));
    return {
      version: 2,
      projectMode: app.projectActive ? 'saved' : 'temporary',
      savePdfCopy: app.savePdfCopy,
      autoSave: app.autoSaveProject,
      fileNames: app.docs.map(d => d.file.name),
      fileMeta: app.docs.map(d => ({ name: d.file.name, size: d.file.size || 0, lastModified: d.file.lastModified || 0 })),
      docStates,
      zooms: app.docs.map(d => d.zoom),
      theme: els.themeSelect.value,
      highlightColor: app.highlightColor,
      layout: { singleDocWidth: app.singleDocWidth, singleDocAlign: app.singleDocAlign, docWeights: app.docs.map(d => d.flexWeight || 1) },
      syncEnabled: app.syncEnabled,
      anchors: app.anchors,
      notes: sanitizeNotes(app.notes),
      annotations: sanitizeNotes(app.notes).filter(n => n.type === 'highlight'),
      scroll,
      savedAt: Date.now()
    };
  }

  function saveWorkspaceNow() {
    const state = getWorkspaceState();
    if (state) {
      localStorage.setItem(WORKSPACE_KEY, JSON.stringify(state));
      writePersistentMetaOnly(state);
      updatePersistentButtons();
    }
  }

  function scheduleWorkspaceSave() {
    clearTimeout(app.saveTimer);
    app.saveTimer = setTimeout(saveWorkspaceNow, 500);
  }

  function updateFileHint() {
    els.fileListHint.textContent = app.files.length ? `[ 已选 ${app.files.length} 个 ]` : '';
    els.fileListHint.title = app.files.map(f => f.name).join('\n');

    els.btnToggleSync.textContent = app.syncEnabled ? '同步开启' : '同步关闭';
    els.btnToggleSync.className = app.syncEnabled ? 'btn-active' : '';

  function updateMemoryStats() {
    const count = app.docs.reduce((sum, d) => sum + d.rendered.size, 0);

  }

  async function destroyAllDocs() {
    for (const doc of app.docs) {
      await destroyDoc(doc);
    }
    app.docs = [];
  }

  async function destroyDoc(doc) {
    unloadAllPages(doc);
    doc.destroyed = true;
    try { await doc.pdf?.destroy?.(); } catch (_) {}
    doc.wrapper?.remove();
  }

  function unloadAllPages(doc) {
    for (const idx of Array.from(doc.rendered.keys())) unloadPage(doc, idx);
  }

  function cancelPageWork(page) {
    if (!page) return;
    try { page.task?.cancel?.(); } catch (_) {}
    page.task = null;
    if (page.detailsTimer) {
      clearTimeout(page.detailsTimer);
      page.detailsTimer = 0;
    }
    page.rendering = false;
  }

  function unloadPage(doc, index) {
    const page = doc.pages[index];
    if (!page) return;
    page.token++;
    cancelPageWork(page);
    const canvas = page.el.querySelector('canvas');
    if (canvas) {
      canvas.width = 0;
      canvas.height = 0;
    }
    page.el.innerHTML = `<div class="page-placeholder">第 ${index + 1} 页</div>`;
    page.cssWidth = 0;
    page.cssHeight = 0;
    page.loaded = false;
    doc.rendered.delete(index);
  }

  function invalidatePagesForZoom(doc) {
    if (!doc.pages.length) return;
    const current = getCurrentPageIndex(doc);
    const keepStart = clamp(current - PREFETCH_PAGES - 1, 0, doc.pages.length - 1);
    const keepEnd = clamp(current + PREFETCH_PAGES + 1, 0, doc.pages.length - 1);

    for (let i = 0; i < doc.pages.length; i++) {
      const page = doc.pages[i];
      page.token++;
      cancelPageWork(page);
      page.loaded = false;
      doc.rendered.delete(i);
      if (i < keepStart || i > keepEnd) unloadPage(doc, i);
    }
    updateMemoryStats();
  }

  async function loadFiles(options = {}) {
    if (!app.files.length) {
      alert('请先选择 PDF 文件。');
      return;
    }

    const saved = app.savedWorkspace;
    const fileNames = app.files.map(f => f.name);
    const isRestore = !!saved && Array.isArray(saved.fileNames) && saved.fileNames.join('|') === fileNames.join('|');

    els.container.innerHTML = '';
    await destroyAllDocs();
    app.navHistory = [];
    app.navIndex = -1;
    updateHistoryButtons();

    if (isRestore) {
      if (saved.layout) {
        app.singleDocWidth = clamp(Number(saved.layout.singleDocWidth || 92), 45, 100);
        app.singleDocAlign = ['flex-start','center','flex-end'].includes(saved.layout.singleDocAlign) ? saved.layout.singleDocAlign : 'center';
        if (els.singleWidthInput) els.singleWidthInput.value = Math.round(app.singleDocWidth);
        if (els.singleAlignSelect) els.singleAlignSelect.value = app.singleDocAlign;
      }
      app.anchors = Array.isArray(saved.anchors) ? saved.anchors : [new Array(app.files.length).fill(0)];
      app.notes = sanitizeNotes(saved.notes || saved.annotations || []);
      app.syncEnabled = saved.syncEnabled !== false;
    } else {
      app.anchors = [new Array(app.files.length).fill(0)];
      app.notes = [];
      app.syncEnabled = true;
    }
    updateSyncButton();

    for (let i = 0; i < app.files.length; i++) {
      const doc = makeDocSkeleton(app.files[i], isRestore ? saved : null, i);
      app.docs.push(doc);
      els.container.appendChild(doc.wrapper);
      attachDocEvents(doc);

      try {
        const arrayBuffer = await doc.file.arrayBuffer();
        doc.pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        doc.pageCount = doc.pdf.numPages;
        doc.pageTotal.textContent = `/ ${doc.pageCount}`;
        await createPagePlaceholders(doc);
      } catch (err) {
        console.error(err);
        doc.wrapper.classList.remove('loading');
        doc.scroller.innerHTML = `<div style="padding:20px;color:var(--danger)">加载失败：${escapeHtml(err.message || err)}</div>`;
      }
    }

    applyAllPanelWidths();
    if (app.docs.length) {
      els.globalZoomInput.value = Math.round(app.docs[0].zoom * 100);
      if (isRestore && saved?.scroll) {
        setTimeout(() => {
          restorePanelScrollState(app.docs[0], saved.scroll);
          updateAllIndicators();
          scheduleRenderAll();
          setTimeout(saveNavState, 300);
        }, 100);
      } else {
        updateAllIndicators();
        scheduleRenderAll();
        setTimeout(saveNavState, 300);
      }
    }
    scheduleWorkspaceSave();
    if (!options.skipFullPersist) schedulePersistentFullSave({ silent: true });
  }

  async function createPagePlaceholders(doc) {
    doc.scroller.innerHTML = '';
    let defaultRatio = 1.414;
    try {
      const firstPage = await doc.pdf.getPage(1);
      const vp = firstPage.getViewport({ scale: 1 });
      defaultRatio = vp.height / vp.width;
    } catch (_) {}

    for (let i = 0; i < doc.pageCount; i++) {
      const pageEl = document.createElement('div');
      pageEl.className = 'page-wrapper';
      pageEl.dataset.pageIndex = String(i);
      pageEl.dataset.ratio = String(defaultRatio);
      pageEl.innerHTML = `<div class="page-placeholder">第 ${i + 1} 页</div>`;
      doc.scroller.appendChild(pageEl);
      doc.pages.push({ el: pageEl, ratio: defaultRatio, cssWidth: 0, cssHeight: 0, loaded: false, rendering: false, token: 0, task: null, detailsTimer: 0 });
    }

    for (let i = 0; i < doc.pageCount; i++) {
      try {
        const page = await doc.pdf.getPage(i + 1);
        const vp = page.getViewport({ scale: 1 });
        const ratio = vp.height / vp.width;
        const pageState = doc.pages[i];
        pageState.ratio = ratio;
        pageState.el.dataset.ratio = String(ratio);
      } catch (_) {
      }
      if (i % 12 === 0) await waitFrame();
    }
  }

  function updatePanelResizerVisibility() {
    app.docs.forEach((doc, index) => {
      if (doc.resizerLeft) {
        doc.resizerLeft.style.display = app.docs.length === 1 || index > 0 ? 'block' : 'none';
        doc.resizerLeft.title = app.docs.length === 1
          ? '拖拽左边框调整单文档宽度'
          : '拖拽调整当前文档与左侧文档占比';
      }

      if (doc.resizerRight) {
        doc.resizerRight.style.display = app.docs.length === 1 || index < app.docs.length - 1 ? 'block' : 'none';
        doc.resizerRight.title = app.docs.length === 1
          ? '拖拽右边框调整单文档宽度'
          : '拖拽调整当前文档与右侧文档占比';
      }
    });
  }

  function startPanelResize(doc, event, side = 'right') {
    if (!doc || !doc.wrapper) return;
    event.preventDefault();
    event.stopPropagation();

    const index = app.docs.indexOf(doc);
    const containerRect = els.container.getBoundingClientRect();
    const startX = event.clientX;
    const startSingleWidth = app.singleDocWidth;
    const startWeights = app.docs.map(d => d.flexWeight || 1);
    const totalWeight = startWeights.reduce((sum, w) => sum + w, 0) || 1;

    let leftIndex = index;
    let rightIndex = index + 1;

    if (side === 'left') {
      leftIndex = index - 1;
      rightIndex = index;
    }

    if (app.docs.length > 1) {
      if (rightIndex >= app.docs.length) {
        leftIndex = index - 1;
        rightIndex = index;
      }
      if (leftIndex < 0) {
        leftIndex = index;
        rightIndex = index + 1;
      }
    }

    const activeHandle = side === 'left' ? doc.resizerLeft : doc.resizerRight;
    activeHandle?.classList.add('dragging');
    document.body.classList.add('resizing-layout');

    const onMove = e => {
      const dx = e.clientX - startX;

      if (app.docs.length === 1) {
        const pctDelta = dx / Math.max(1, containerRect.width) * 100;
        const signedDelta = side === 'left' ? -pctDelta : pctDelta;
        app.singleDocWidth = clamp(startSingleWidth + signedDelta, 35, 100);
        if (els.singleWidthInput) els.singleWidthInput.value = Math.round(app.singleDocWidth);
      } else if (leftIndex >= 0 && rightIndex < app.docs.length) {
        const pxPerWeight = containerRect.width / totalWeight;
        const rawDelta = dx / Math.max(80, pxPerWeight);

        const leftStart = startWeights[leftIndex] || 1;
        const rightStart = startWeights[rightIndex] || 1;
        const pairTotal = leftStart + rightStart;
        const leftNext = clamp(leftStart + rawDelta, 0.35, pairTotal - 0.35);
        const rightNext = clamp(pairTotal - leftNext, 0.35, pairTotal - 0.35);
        app.docs[leftIndex].flexWeight = leftNext;
        app.docs[rightIndex].flexWeight = rightNext;
      }

      applyAllPanelWidths();
      scheduleRenderAll();
    };

    const onUp = () => {
      activeHandle?.classList.remove('dragging');
      document.body.classList.remove('resizing-layout');
      document.removeEventListener('pointermove', onMove, true);
      document.removeEventListener('pointerup', onUp, true);
      scheduleWorkspaceSave();
      schedulePersistentFullSave({ silent: true });
    };

    document.addEventListener('pointermove', onMove, true);
    document.addEventListener('pointerup', onUp, true);
  }

  function attachDocEvents(doc) {
    const docIndex = () => app.docs.indexOf(doc);

    doc.drag.ondragstart = e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(docIndex()));
      doc.wrapper.style.opacity = '0.45';
    };
    doc.drag.ondragend = () => { doc.wrapper.style.opacity = '1'; };
    doc.wrapper.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
    doc.wrapper.ondrop = e => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to = Array.from(els.container.children).indexOf(doc.wrapper);
      if (!Number.isNaN(from) && !Number.isNaN(to) && from !== to) reorderDocuments(from, to);
    };

    doc.sidebarBtn.onclick = () => {
      const show = doc.sidebar.style.display !== 'flex';
      doc.sidebar.style.display = show ? 'flex' : 'none';
      doc.sidebarBtn.classList.toggle('active', show);
      if (show && !doc.outlineLoaded) {
        doc.outlineLoaded = true;
        renderOutline(doc);
      }
    };

    const tabs = doc.sidebar.querySelectorAll('.sidebar-tab');
    const tocArea = doc.sidebar.querySelector('.toc-area');
    const searchArea = doc.sidebar.querySelector('.search-area');
    const notesArea = doc.sidebar.querySelector('.notes-area');
    const groupsArea = doc.sidebar.querySelector('.groups-area');
    
    tabs.forEach(tab => {
      tab.onclick = () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        tocArea.style.display = target === 'toc' ? 'block' : 'none';
        searchArea.style.display = target === 'search' ? 'block' : 'none';
        notesArea.style.display = target === 'notes' ? 'block' : 'none';
        if (groupsArea) groupsArea.style.display = target === 'groups' ? 'block' : 'none';

        if (target === 'search') doc.sidebar.querySelector('.search-input').focus();
        if (target === 'notes') { renderNotesList(doc); doc.sidebar.querySelector('.note-search-input').focus(); }
        if (target === 'groups') { renderGroupsList(doc); }
      };
    });

    const searchInput = doc.sidebar.querySelector('.search-input');
    const searchResults = doc.sidebar.querySelector('.search-results');
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') runSearch(doc, searchInput.value, searchResults);
    });
    doc.sidebar.querySelector('.btn-page-note').onclick = () => addOrEditPageNote(doc);
    doc.sidebar.querySelector('.btn-highlight').onclick = () => addHighlightFromSelection(doc);
    doc.sidebar.querySelector('.note-search-input').addEventListener('input', () => renderNotesList(doc));

    const updateZoom = pct => {
      const next = clamp((parseInt(pct, 10) || 90) / 100, MIN_ZOOM, MAX_ZOOM);
      setDocZoom(doc, next);
    };
    doc.zOut.onclick = () => updateZoom(parseInt(doc.zInput.value, 10) - 10);
    doc.zIn.onclick = () => updateZoom(parseInt(doc.zInput.value, 10) + 10);
    doc.zInput.addEventListener('change', () => updateZoom(doc.zInput.value));
    doc.zInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.currentTarget.blur(); updateZoom(e.currentTarget.value); } });

    doc.widthDown.onclick = () => adjustDocLayout(doc, -0.18);
    doc.widthUp.onclick = () => adjustDocLayout(doc, 0.18);
    doc.resizerLeft.addEventListener('pointerdown', e => startPanelResize(doc, e, 'left'));
    doc.resizerRight.addEventListener('pointerdown', e => startPanelResize(doc, e, 'right'));

    doc.pageInput.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const page = clamp((parseInt(doc.pageInput.value, 10) || 1) - 1, 0, Math.max(0, doc.pageCount - 1));
      saveNavState();
      scrollDocToPage(doc, page, 0, true);
      doc.pageInput.blur();
    });

    doc.close.addEventListener('click', async e => {
      e.preventDefault();
      e.stopPropagation();
      await removeDocumentByDoc(doc, { confirmClose: false });
    });

    const markActive = () => { app.userActiveDocId = doc.id; };
    doc.scroller.addEventListener('mouseenter', markActive);
    doc.scroller.addEventListener('mousedown', markActive);
    doc.scroller.addEventListener('wheel', markActive, { passive: true });
    doc.scroller.addEventListener('touchstart', markActive, { passive: true });
    doc.scroller.addEventListener('keydown', markActive);

    doc.scroller.addEventListener('scroll', () => {
      if (doc.destroyed) return;

      const now = performance.now();
      const top = doc.scroller.scrollTop;
      const dt = Math.max(1, now - (doc.lastScrollTime || now));
      const delta = Math.abs(top - (doc.lastScrollTop || 0));
      doc.scrollFast = (delta / dt) > FAST_SCROLL_PX_PER_MS || delta > doc.scroller.clientHeight * FAST_SCROLL_VIEWPORT_FACTOR;
      doc.lastScrollTop = top;
      doc.lastScrollTime = now;

      updateIndicator(doc);

      const isPassiveSyncedScroll = app.syncing && app.userActiveDocId !== doc.id;
      if (isPassiveSyncedScroll) return;

      scheduleRenderAround(doc, doc.scrollFast);
      scheduleWorkspaceSave();

      clearTimeout(app.historyTimer);
      app.historyTimer = setTimeout(saveNavState, 1200);

      if (!app.syncEnabled || app.syncing || app.suppressHistory) return;
      if (app.userActiveDocId !== doc.id) return;
      scheduleSync(doc);
    }, { passive: true });
  }

  function moveItem(arr, from, to) {
    arr.splice(to, 0, arr.splice(from, 1)[0]);
  }

  function reorderDocuments(from, to) {
    const states = app.docs.map(getPanelScrollState);
    moveItem(app.docs, from, to);
    moveItem(states, from, to);
    app.anchors.forEach(a => moveItem(a, from, to));
    app.docs.forEach(d => els.container.appendChild(d.wrapper));
    app.docs.forEach((d, i) => restorePanelScrollState(d, states[i]));
    updateAllIndicators();
    scheduleWorkspaceSave();
    schedulePersistentFullSave({ silent: true });
    saveNavState();
  }

  async function removeDocumentByDoc(doc, options = {}) {
    const index = app.docs.indexOf(doc);
    if (index < 0) return;
    await removeDocument(index, options);
  }

  async function removeDocument(index, options = {}) {
    if (index < 0 || index >= app.docs.length) return;
    const doc = app.docs[index];
    const needConfirm = options.confirmClose === true;
    if (needConfirm && !confirm(`关闭《${doc.file.name}》吗？`)) return;
    app.docs.splice(index, 1);
    app.files.splice(index, 1);
    app.notes = app.notes.filter(n => !noteMatchesDoc(n, doc));
    app.anchors.forEach(a => a.splice(index, 1));
    app.anchors = app.anchors.filter(a => a.length === app.docs.length);
    if (app.docs.length && !app.anchors.length) app.anchors = [new Array(app.docs.length).fill(0)];
    if (app.userActiveDocId === doc.id) app.userActiveDocId = app.docs[0]?.id || null;
    await destroyDoc(doc);
    toast(`已关闭：${doc.file.name}`);
    if (!app.docs.length) {
      await clearWorkspace(false);
      return;
    }
    updateFileHint();
    updateAllIndicators();
    scheduleWorkspaceSave();
    schedulePersistentFullSave({ silent: true });
    saveNavState();
  }

  function updateIndicator(doc) {
    const idx = getCurrentPageIndex(doc);
    doc.currentIndex = idx;
    if (document.activeElement !== doc.pageInput) doc.pageInput.value = String(idx + 1);
    doc.pageTotal.textContent = `/ ${doc.pageCount || '?'}`;
  }

  function updateAllIndicators() {
    app.docs.forEach(updateIndicator);
    updateHistoryButtons();
    updateMemoryStats();
  }

  function findPageIndexAt(doc, y) {
    if (!doc.pages.length) return 0;
    let lo = 0;
    let hi = doc.pages.length - 1;
    let ans = hi;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const el = doc.pages[mid].el;
      if (el.offsetTop + el.offsetHeight > y) {
        ans = mid;
        hi = mid - 1;
      } else {
        lo = mid + 1;
      }
    }
    return clamp(ans, 0, doc.pages.length - 1);
  }

  function getCurrentPageIndex(doc) {
    if (!doc.pages.length) return 0;
    return findPageIndexAt(doc, doc.scroller.scrollTop + doc.scroller.clientHeight / 2);
  }

  function getPanelScrollState(doc) {
    if (!doc.pages.length) return { index: 0, pct: 0 };
    const top = doc.scroller.scrollTop;
    const index = findPageIndexAt(doc, top);
    const el = doc.pages[index].el;
    return { index, pct: clamp((top - el.offsetTop) / Math.max(1, el.offsetHeight), 0, 0.999) };
  }

  function getSyncAnchorState(doc) {
    if (!doc.pages.length) return { index: 0, pct: 0, anchorPx: 0 };
    const anchorPx = Math.max(12, doc.scroller.clientHeight * SYNC_ANCHOR_RATIO);
    const y = doc.scroller.scrollTop + anchorPx;
    const index = findPageIndexAt(doc, y);
    const el = doc.pages[index].el;
    const pct = clamp((y - el.offsetTop) / Math.max(1, el.offsetHeight), 0, 0.999);
    return { index, pct, anchorPx };
  }


  function getBoundarySyncState(doc) {
    if (!doc.pages.length) {
      return { logicalPage: 0, viewportY: 0, pageIndex: 0, pagePct: 0, edge: 'top' };
    }

    const centerY = doc.scroller.scrollTop + doc.scroller.clientHeight / 2;
    const pageIndex = findPageIndexAt(doc, centerY);
    const pageEl = doc.pages[pageIndex].el;
    const pagePct = clamp((centerY - pageEl.offsetTop) / Math.max(1, pageEl.offsetHeight), 0, 0.999);

    let logicalPage = pageIndex;
    let boundaryY = pageEl.offsetTop;
    let edge = 'top';

    if (pagePct >= BOUNDARY_SYNC_SWITCH_RATIO && pageIndex < doc.pages.length - 1) {
      logicalPage = pageIndex + 1;
      boundaryY = doc.pages[logicalPage].el.offsetTop;
      edge = 'next-top';
    }

    return {
      logicalPage,
      viewportY: boundaryY - doc.scroller.scrollTop,
      pageIndex,
      pagePct,
      edge
    };
  }

  function scrollDocToBoundary(doc, logicalPage, viewportY, preferIdleRender = false) {
    const idx = clamp(logicalPage, 0, Math.max(0, doc.pages.length - 1));
    const el = doc.pages[idx]?.el;
    if (!el) return;
    doc.scroller.scrollTop = Math.max(0, el.offsetTop - viewportY);
    updateIndicator(doc);
    scheduleRenderAround(doc, preferIdleRender);
    scheduleWorkspaceSave();
  }

  function restorePanelScrollState(doc, state) {
    if (!doc || !state) return;
    const idx = clamp(state.index || 0, 0, Math.max(0, doc.pages.length - 1));
    const el = doc.pages[idx]?.el;
    if (!el) return;
    doc.scroller.scrollTop = el.offsetTop + el.offsetHeight * clamp(state.pct || 0, 0, 0.999);
  }

  function scrollDocToPage(doc, pageIndex, pct = 0, syncAfter = false, preferIdleRender = false) {
    const idx = clamp(pageIndex, 0, Math.max(0, doc.pages.length - 1));
    const el = doc.pages[idx]?.el;
    if (!el) return;
    doc.scroller.scrollTop = el.offsetTop + el.offsetHeight * clamp(pct, 0, 0.999);
    updateIndicator(doc);
    scheduleRenderAround(doc, preferIdleRender);
    scheduleWorkspaceSave();
    if (syncAfter) performSync(doc);
  }

  function scrollDocToAnchor(doc, pageIndex, pct = 0, preferIdleRender = false) {
    const idx = clamp(pageIndex, 0, Math.max(0, doc.pages.length - 1));
    const el = doc.pages[idx]?.el;
    if (!el) return;
    const anchorPx = Math.max(12, doc.scroller.clientHeight * SYNC_ANCHOR_RATIO);
    doc.scroller.scrollTop = el.offsetTop + el.offsetHeight * clamp(pct, 0, 0.999) - anchorPx;
    updateIndicator(doc);
    scheduleRenderAround(doc, preferIdleRender);
    scheduleWorkspaceSave();
  }

  function getActiveAnchorForSource(sourceIndex, sourcePage) {
    const fallback = new Array(app.docs.length).fill(0);
