    if (!app.anchors.length) return fallback;

    let activeAnchor = app.anchors[0] || fallback;
    for (let i = 0; i < app.anchors.length; i++) {
      const anchor = app.anchors[i];
      const anchorPage = anchor[sourceIndex] || 0;
      if (anchorPage <= sourcePage) activeAnchor = anchor;
      else break;
    }
    return activeAnchor;
  }

  function mapPageWithAnchor(activeAnchor, sourceIndex, targetIndex, sourcePage) {
    const sourceBase = activeAnchor[sourceIndex] || 0;
    const targetBase = activeAnchor[targetIndex] || 0;
    return targetBase + (sourcePage - sourceBase);
  }

  function mapPageByAnchors(sourceIndex, targetIndex, sourcePage) {
    const activeAnchor = getActiveAnchorForSource(sourceIndex, sourcePage);
    return mapPageWithAnchor(activeAnchor, sourceIndex, targetIndex, sourcePage);
  }

  function performSync(sourceDoc) {
    const sourceIndex = app.docs.indexOf(sourceDoc);
    if (sourceIndex < 0 || !sourceDoc.pages.length) return;

    const centerY = sourceDoc.scroller.scrollTop + sourceDoc.scroller.clientHeight / 2;
    const sourcePage = findPageIndexAt(sourceDoc, centerY);
    const sourceEl = sourceDoc.pages[sourcePage]?.el;
    if (!sourceEl) return;

    const pagePct = clamp((centerY - sourceEl.offsetTop) / Math.max(1, sourceEl.offsetHeight), 0, 0.999);
    const sourceTopViewportY = sourceEl.offsetTop - sourceDoc.scroller.scrollTop;

    const hasNext = sourcePage < sourceDoc.pages.length - 1;
    const nextSourcePage = hasNext ? sourcePage + 1 : sourcePage;
    const sourceNextEl = sourceDoc.pages[nextSourcePage]?.el || sourceEl;
    const sourceNextViewportY = sourceNextEl.offsetTop - sourceDoc.scroller.scrollTop;
    const blend = hasNext ? smoothstep(BOUNDARY_BLEND_START, BOUNDARY_BLEND_END, pagePct) : 0;

    const activeAnchor = getActiveAnchorForSource(sourceIndex, sourcePage);

    app.syncing = true;
    app.docs.forEach((doc, targetIndex) => {
      if (doc === sourceDoc || !doc.pages.length) return;

      const targetTopPage = clamp(
        mapPageWithAnchor(activeAnchor, sourceIndex, targetIndex, sourcePage),
        0,
        doc.pages.length - 1
      );
      const targetTopEl = doc.pages[targetTopPage]?.el;
      if (!targetTopEl) return;

      const targetNextPage = clamp(
        mapPageWithAnchor(activeAnchor, sourceIndex, targetIndex, nextSourcePage),
        0,
        doc.pages.length - 1
      );
      const targetNextEl = doc.pages[targetNextPage]?.el || targetTopEl;

      const topAlignedScroll = targetTopEl.offsetTop - sourceTopViewportY;
      const nextAlignedScroll = targetNextEl.offsetTop - sourceNextViewportY;
      const blendedScroll = topAlignedScroll * (1 - blend) + nextAlignedScroll * blend;

      doc.scroller.scrollTop = Math.max(0, blendedScroll);
      updateIndicator(doc);
      scheduleRenderAround(doc, sourceDoc.scrollFast);
      scheduleWorkspaceSave();
    });

    requestAnimationFrame(() => { app.syncing = false; });
  }

  function addAnchor() {
    if (app.docs.length < 2) {
      toast('至少打开两个文档才需要错位锚点。');
      return;
    }
    const anchor = app.docs.map(getCurrentPageIndex);
    app.anchors = app.anchors.filter(a => Math.abs((a[0] || 0) - anchor[0]) > 1);
    app.anchors.push(anchor);
    app.anchors.sort((a, b) => (a[0] || 0) - (b[0] || 0));
    app.syncEnabled = true;
    updateSyncButton();
    scheduleWorkspaceSave();
    toast(`锚点已记录：${anchor.map(n => n + 1).join(' / ')}`);
  }

  function setDocZoom(doc, zoom) {
    const state = getPanelScrollState(doc);
    doc.zoom = clamp(zoom, MIN_ZOOM, MAX_ZOOM);
    doc.zInput.value = Math.round(doc.zoom * 100);
    applyPanelWidth(doc);
    restorePanelScrollState(doc, state);
    scheduleZoomRerender(doc);
    scheduleWorkspaceSave();
    updateMemoryStats();
  }

  function applyGlobalZoom(pct) {
    const zoom = clamp((parseInt(pct, 10) || 90) / 100, MIN_ZOOM, MAX_ZOOM);
    els.globalZoomInput.value = Math.round(zoom * 100);
    const sourceDoc = getActiveDoc();
    app.docs.forEach(doc => setDocZoom(doc, zoom));
    if (sourceDoc && app.syncEnabled && app.docs.includes(sourceDoc)) {
      requestAnimationFrame(() => requestAnimationFrame(() => performSync(sourceDoc)));
    }
  }

  function applyPageVisualScale(page) {
    const content = page.el.querySelector('.page-content');
    if (!content || !page.cssWidth) return;
    const targetWidth = parseFloat(page.el.style.width) || page.el.clientWidth || page.cssWidth;
    const scale = targetWidth / Math.max(1, page.cssWidth);
    content.style.transform = Math.abs(scale - 1) < 0.001 ? '' : `scale(${scale})`;
  }

  function applyPanelWidth(doc) {
    const available = Math.max(200, doc.scroller.clientWidth);
    const targetWidth = Math.max(160, Math.floor(available * doc.zoom));
    for (const page of doc.pages) {
      page.el.style.width = `${targetWidth}px`;
      page.el.style.height = `${Math.floor(targetWidth * page.ratio)}px`;
      if (page.loaded) applyPageVisualScale(page);
    }
  }

  function applyDocumentLayout() {
    if (!app.docs.length) return;
    updatePanelResizerVisibility();
    if (app.docs.length === 1) {
      els.container.style.justifyContent = app.singleDocAlign || 'center';
      const doc = app.docs[0];
      doc.wrapper.style.flex = `0 0 ${app.singleDocWidth}%`;
      doc.wrapper.style.maxWidth = `${app.singleDocWidth}%`;
      doc.wrapper.style.minWidth = '280px';
    } else {
      els.container.style.justifyContent = 'stretch';
      app.docs.forEach(doc => {
        doc.wrapper.style.flex = `${clamp(doc.flexWeight || 1, 0.45, 3)} 1 0`;
        doc.wrapper.style.maxWidth = '';
        doc.wrapper.style.minWidth = '240px';
      });
    }
  }

  function applyAllPanelWidths() {
    applyDocumentLayout();
    app.docs.forEach(applyPanelWidth);
  }

  function adjustDocLayout(doc, delta) {
    if (!doc) return;
    if (app.docs.length === 1) {
      app.singleDocWidth = clamp(app.singleDocWidth + delta * 100, 45, 100);
      if (els.singleWidthInput) els.singleWidthInput.value = Math.round(app.singleDocWidth);
    } else {
      doc.flexWeight = clamp((doc.flexWeight || 1) + delta, 0.45, 3);
    }
    applyAllPanelWidths();
    scheduleRenderAll();
    scheduleWorkspaceSave();
    schedulePersistentFullSave({ silent: true });
  }

  function resetLayout() {
    app.singleDocWidth = 92;
    app.singleDocAlign = 'center';
    if (els.singleWidthInput) els.singleWidthInput.value = '92';
    if (els.singleAlignSelect) els.singleAlignSelect.value = 'center';
    app.docs.forEach(doc => { doc.flexWeight = 1; });
    applyAllPanelWidths();
    scheduleRenderAll();
    scheduleWorkspaceSave();
    schedulePersistentFullSave({ silent: true });
  }

  function scheduleZoomRerender(doc) {
    if (!doc.pdf || !doc.pages.length || doc.destroyed) return;
    clearTimeout(doc.zoomRerenderTimer);
    doc.zoomRerenderTimer = setTimeout(() => {
      if (doc.destroyed) return;
      const current = getCurrentPageIndex(doc);
      const start = clamp(current - PREFETCH_PAGES, 0, doc.pages.length - 1);
      const end = clamp(current + PREFETCH_PAGES, 0, doc.pages.length - 1);
      const indices = [];
      for (let i = start; i <= end; i++) indices.push(i);
      indices.sort((a, b) => Math.abs(a - current) - Math.abs(b - current));
      for (const i of indices) renderPage(doc, i, { force: doc.pages[i]?.loaded });
      pruneRenderedPages(doc, current, start, end);
      updateMemoryStats();
    }, ZOOM_RERENDER_IDLE_MS);
  }

  function scheduleRenderAll() {
    app.docs.forEach(scheduleRenderAround);
  }

  function scheduleRenderAround(doc, preferIdle = false) {
    if (!doc.pdf || !doc.pages.length || doc.destroyed) return;
    const requestId = ++doc.renderRequestId;
    clearTimeout(doc.renderTimer);
    const delay = preferIdle ? SCROLL_RENDER_IDLE_FAST_MS : SCROLL_RENDER_IDLE_NORMAL_MS;
    doc.renderTimer = setTimeout(() => {
      requestAnimationFrame(() => {
        if (doc.destroyed || requestId !== doc.renderRequestId) return;
        renderAround(doc).catch(err => console.error('renderAround failed', err));
      });
    }, delay);
  }

  async function renderAround(doc) {
    if (doc.destroyed) return;
    const current = getCurrentPageIndex(doc);
    const start = clamp(current - PREFETCH_PAGES, 0, doc.pages.length - 1);
    const end = clamp(current + PREFETCH_PAGES, 0, doc.pages.length - 1);

    for (let i = 0; i < doc.pages.length; i++) {
      const page = doc.pages[i];
      if (page.rendering && Math.abs(i - current) > PREFETCH_PAGES + RENDER_STALE_DISTANCE) {
        page.token++;
        cancelPageWork(page);
      }
    }

    const indices = [];
    for (let i = start; i <= end; i++) indices.push(i);
    indices.sort((a, b) => Math.abs(a - current) - Math.abs(b - current));
    for (const i of indices) renderPage(doc, i);

    pruneRenderedPages(doc, current, start, end);
    updateMemoryStats();
  }

  function pruneRenderedPages(doc, current, protectedStart, protectedEnd) {
    for (const index of Array.from(doc.rendered.keys())) {
      if (index >= protectedStart && index <= protectedEnd) continue;
      if (Math.abs(index - current) > KEEP_DISTANCE) unloadPage(doc, index);
    }
    const rendered = Array.from(doc.rendered.entries());
    if (rendered.length <= MAX_RENDERED_PAGES_PER_DOC) return;
    rendered.sort((a, b) => a[1].lastUsed - b[1].lastUsed);
    for (const [index] of rendered) {
      if (doc.rendered.size <= MAX_RENDERED_PAGES_PER_DOC) break;
      if (index >= protectedStart && index <= protectedEnd) continue;
      unloadPage(doc, index);
    }
  }

  function isRenderStillRelevant(doc, index) {
    if (doc.destroyed || !doc.pages.length) return false;
    const current = getCurrentPageIndex(doc);
    return Math.abs(index - current) <= PREFETCH_PAGES + RENDER_STALE_DISTANCE;
  }

  function scheduleSync(doc) {
    if (doc.syncRaf) return;
    doc.syncRaf = requestAnimationFrame(() => {
      doc.syncRaf = 0;
      if (!app.syncEnabled || app.syncing || app.suppressHistory) return;
      if (app.userActiveDocId !== doc.id || doc.destroyed) return;
      performSync(doc);
    });
  }

  function renderPage(doc, index, options = {}) {
    const force = options.force === true;
    const pageState = doc.pages[index];
    if (!pageState || doc.destroyed) return;

    if (pageState.rendering) {
      if (!force) return;
      pageState.token++;
      cancelPageWork(pageState);
      pageState.rendering = false;
    }

    if (pageState.loaded && !force) {
      doc.rendered.set(index, { lastUsed: performance.now() });
      return;
    }

    pageState.rendering = true;
    const token = ++pageState.token;
    const hasOldContent = !!pageState.el.querySelector('.page-content');
    if (!hasOldContent) {
      pageState.el.innerHTML = `<div class="page-placeholder">渲染第 ${index + 1} 页...</div>`;
    }

    doc.renderQueue = doc.renderQueue.then(async () => {
      if (doc.destroyed || token !== pageState.token) return;
      if (!isRenderStillRelevant(doc, index)) return;

      let canvas = null;
      let content = null;
      try {
        const page = await doc.pdf.getPage(index + 1);
        if (doc.destroyed || token !== pageState.token || !isRenderStillRelevant(doc, index)) return;

        const baseVp = page.getViewport({ scale: 1 });
        const width = parseFloat(pageState.el.style.width) || pageState.el.clientWidth || 800;
        const scale = width / baseVp.width;
        const viewport = page.getViewport({ scale });
        const ratio = viewport.height / viewport.width;
        pageState.ratio = ratio;
        pageState.el.dataset.ratio = String(ratio);
        pageState.el.style.height = `${Math.floor(width * ratio)}px`;

        canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const cssWidth = Math.round(viewport.width);
        const cssHeight = Math.round(viewport.height);
        const rawOutputScale = window.devicePixelRatio || 1;
        const pixelCapScale = Math.sqrt(MAX_CANVAS_PIXELS / Math.max(1, cssWidth * cssHeight));
        const outputScale = Math.max(1, Math.min(rawOutputScale, HI_DPI_MAX_SCALE, pixelCapScale));

        canvas.width = Math.max(1, Math.floor(cssWidth * outputScale));
        canvas.height = Math.max(1, Math.floor(cssHeight * outputScale));
        canvas.style.width = `${cssWidth}px`;
        canvas.style.height = `${cssHeight}px`;
        canvas.dataset.outputScale = String(outputScale);

        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();

        content = document.createElement('div');
        content.className = 'page-content';
        content.style.width = `${cssWidth}px`;
        content.style.height = `${cssHeight}px`;
        content.dataset.baseWidth = String(cssWidth);
        content.dataset.baseHeight = String(cssHeight);
        content.appendChild(canvas);

        const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
        const renderTask = page.render({ canvasContext: ctx, transform, viewport, intent: 'display' });
        pageState.task = renderTask;
        try {
          await renderTask.promise;
        } finally {
          if (pageState.task === renderTask) pageState.task = null;
        }
        if (doc.destroyed || token !== pageState.token || !isRenderStillRelevant(doc, index)) {
          canvas.width = 0;
          canvas.height = 0;
          return;
        }

        pageState.cssWidth = cssWidth;
        pageState.cssHeight = cssHeight;
        pageState.el.replaceChildren(content);
        pageState.loaded = true;
        doc.wrapper.classList.remove('loading');
        doc.rendered.set(index, { lastUsed: performance.now() });
        renderStoredNotesForPage(doc, index);
        renderSearchHitForPage(doc, index);
        scheduleDetailsLayer(doc, index, page, pageState, viewport, scale, token);
      } catch (err) {
        const cancelled = err?.name === 'RenderingCancelledException' || /cancel/i.test(String(err?.message || err));
        if (!cancelled) console.error('page render failed', err);
        if (canvas) { canvas.width = 0; canvas.height = 0; }
        if (!cancelled && token === pageState.token && !hasOldContent) {
          pageState.el.innerHTML = `<div style="color:var(--danger);padding:12px;">第 ${index + 1} 页渲染失败</div>`;
        }
      } finally {
        if (token === pageState.token) pageState.rendering = false;
      }
    });
  }

  function scheduleDetailsLayer(doc, index, page, pageState, viewport, scale, token) {
    if (pageState.detailsTimer) clearTimeout(pageState.detailsTimer);
    pageState.detailsTimer = setTimeout(async () => {
      pageState.detailsTimer = 0;
      if (doc.destroyed || token !== pageState.token || !pageState.loaded || !isRenderStillRelevant(doc, index)) return;

      try {
        const textLayer = document.createElement('div');
        textLayer.className = 'textLayer';
        textLayer.style.width = `${viewport.width}px`;
        textLayer.style.height = `${viewport.height}px`;
        textLayer.style.setProperty('--scale-factor', scale);
        const content = pageState.el.querySelector('.page-content');
        if (!content) return;
        content.appendChild(textLayer);
        const textContent = await page.getTextContent();
        if (doc.destroyed || token !== pageState.token || !pageState.loaded || !isRenderStillRelevant(doc, index)) {
          textLayer.remove();
          return;
        }
        const textDivs = [];
        await pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayer,
          viewport,
          textDivs
        }).promise;
        pageState.textDivs = textDivs;
      } catch (_) {
      }

      if (doc.destroyed || token !== pageState.token || !pageState.loaded || !isRenderStillRelevant(doc, index)) return;
      try {
        const annotations = await page.getAnnotations();
        if (doc.destroyed || token !== pageState.token || !pageState.loaded) return;
        const content = pageState.el.querySelector('.page-content');
        if (!content) return;
        addAnnotationLinks(doc, content, annotations, viewport);
        renderStoredNotesForPage(doc, index);
        renderSearchHitForPage(doc, index);
      } catch (err) {
        console.warn('annotation render failed', err);
      }
    }, DETAILS_LAYER_IDLE_MS);
  }

  function addAnnotationLinks(doc, wrapper, annotations, viewport) {
    annotations.forEach(anno => {
      if (anno.subtype !== 'Link' || !anno.rect) return;
      const a = document.createElement('a');
      const rect = viewport.convertToViewportRectangle(anno.rect);
      const x = Math.min(rect[0], rect[2]);
      const y = Math.min(rect[1], rect[3]);
      a.className = 'pdf-link';
      a.style.left = `${x}px`;
      a.style.top = `${y}px`;
      a.style.width = `${Math.abs(rect[2] - rect[0])}px`;
      a.style.height = `${Math.abs(rect[3] - rect[1])}px`;
      a.style.cursor = 'pointer';

      if (anno.url) {
        a.href = anno.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.title = anno.url;
      } else if (anno.dest) {
        a.href = '#';
        a.title = '跳转至文档内其它位置';
        a.onclick = async e => {
          e.preventDefault();
          await jumpToDestination(doc, anno.dest);
        };
      }
      wrapper.appendChild(a);
    });
  }

  async function jumpToDestination(doc, dest) {
    try {
      let resolved = dest;
      if (typeof resolved === 'string') resolved = await doc.pdf.getDestination(resolved);
      if (resolved?.[0]) {
        const pageIndex = await doc.pdf.getPageIndex(resolved[0]);
        saveNavState();
        scrollDocToPage(doc, pageIndex, 0, true);
      }
    } catch (err) {
      console.warn('destination jump failed', err);
    }
  }

  async function renderOutline(doc) {
    const tocArea = doc.sidebar.querySelector('.toc-area');
    try {
      const outline = await doc.pdf.getOutline();
      tocArea.innerHTML = '';
      if (!outline?.length) {
        tocArea.innerHTML = '<div style="color:var(--text-muted);padding:10px;">未提取到书签/目录</div>';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'toc-list';
      outline.forEach(item => ul.appendChild(makeOutlineItem(doc, item)));
      tocArea.appendChild(ul);
    } catch (err) {
      console.warn('outline failed', err);
      tocArea.innerHTML = '<div style="color:var(--danger);padding:10px;">目录读取失败</div>';
    }
  }

  function makeOutlineItem(doc, item) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.className = 'toc-link';
    a.textContent = item.title || '(未命名)';
    a.onclick = async () => {
      saveNavState();
      await jumpToDestination(doc, item.dest);
    };
    li.appendChild(a);
    if (item.items?.length) {
      const ul = document.createElement('ul');
      ul.className = 'toc-list';
      item.items.forEach(child => ul.appendChild(makeOutlineItem(doc, child)));
      li.appendChild(ul);
    }
    return li;
  }

  async function runSearch(doc, query, resultsEl) {
    const q = query.trim();
    const token = ++doc.searchToken;
    if (!q) return;
    resultsEl.innerHTML = '<div style="padding:10px;color:var(--text-muted);">搜索中...</div>';

    const frag = document.createDocumentFragment();
    let count = 0;
    const lowerQ = q.toLowerCase();
    const safeQ = escapeRegExp(q);
    const re = new RegExp(safeQ, 'ig');

    try {
      for (let i = 1; i <= doc.pageCount; i++) {
        if (token !== doc.searchToken) return;
        const page = await doc.pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });
        const text = await page.getTextContent();
        const items = text.items || [];
        const pageText = items.map(item => item.str || '').join(' ');
        const lowerText = pageText.toLowerCase();

        let match = lowerText.indexOf(lowerQ);
        while (match !== -1) {
          count++;
          const matchInfo = findSearchMatchInfo(items, match, q.length, viewport);
          const snippetStart = Math.max(0, match - 24);
          const snippetEnd = Math.min(pageText.length, match + q.length + 42);
          const snippet = pageText.slice(snippetStart, snippetEnd);
          const div = document.createElement('div');
          div.className = 'search-result-item';
          div.dataset.page = String(i);
          div.dataset.match = String(count);
          div.innerHTML = `<span style="color:var(--text-muted);font-size:10px;">P.${i} · #${count}</span>: ...${escapeHtml(snippet).replace(re, m => `<b>${escapeHtml(m)}</b>`)}...`;
          div.onclick = () => {
            saveNavState();
            scrollDocToSearchMatch(doc, i - 1, matchInfo, true);
            toast('已定位到该处匹配内容。', 1200);
          };
          frag.appendChild(div);

          match = lowerText.indexOf(lowerQ, match + Math.max(1, lowerQ.length));
          if (count > 1000) break;
        }

        if (i % 8 === 0) {
          resultsEl.innerHTML = `<div style="padding:5px;color:var(--text-muted);">已搜索 ${i}/${doc.pageCount} 页，找到 ${count} 条...</div>`;
          await waitFrame();
        }
        if (count > 1000) break;
      }

      resultsEl.innerHTML = '';
      if (!count) {
        resultsEl.innerHTML = '<div style="padding:10px;color:var(--text-muted);">未找到匹配项</div>';
      } else {
        const head = document.createElement('div');
        head.style.cssText = 'padding:5px;font-weight:bold;border-bottom:1px solid var(--border);margin-bottom:5px;';
        head.textContent = count > 1000 ? '结果超过 1000 条，已截断显示' : `共 ${count} 条结果`;
        resultsEl.append(head, frag);
      }
    } catch (err) {
      console.error('search failed', err);
      resultsEl.innerHTML = '<div style="padding:10px;color:var(--danger);">搜索失败</div>';
    }
  }

  function getNoteSortPosition(note) {
    if (!note) return { page: 0, y: 0, x: 0 };
    const rects = Array.isArray(note.rects) ? note.rects.filter(r => Number.isFinite(r.pageIndex)) : [];
    const samePage = rects.filter(r => r.pageIndex === note.pageIndex);
    const pool = samePage.length ? samePage : rects;
    if (!pool.length) return { page: note.pageIndex || 0, y: 0, x: 0 };
    const first = pool.slice().sort((a, b) => (a.pageIndex - b.pageIndex) || (a.y - b.y) || (a.x - b.x))[0];
    return { page: first.pageIndex, y: first.y || 0, x: first.x || 0 };
  }

  function compareNotesByArticleOrder(a, b) {
    const pa = getNoteSortPosition(a);
    const pb = getNoteSortPosition(b);
    return (pa.page - pb.page) || (pa.y - pb.y) || (pa.x - pb.x) || ((a.createdAt || 0) - (b.createdAt || 0));
  }

  function describeNotePosition(note) {
    const pos = getNoteSortPosition(note);
    const pct = Math.round((pos.y || 0) * 100);
    return `P.${(note.pageIndex || pos.page || 0) + 1}${note.type === 'highlight' ? ` · 页内约 ${pct}%` : ''}`;
  }

  function getNoteRawPreview(note) {
    const noteText = String(note?.note || '').trim();
    const srcText = String(note?.text || '').trim();
    if (noteText && srcText) return { primary: noteText, secondary: srcText };
    if (noteText) return { primary: noteText, secondary: '' };
    if (srcText) return { primary: srcText, secondary: '' };
    return { primary: '', secondary: '' };
  }


  function clampModalToViewport(modal) {
    const rect = modal.getBoundingClientRect();
    const margin = 10;
    const left = clamp(rect.left, margin, Math.max(margin, window.innerWidth - Math.min(rect.width, window.innerWidth - margin)));
    const top = clamp(rect.top, margin, Math.max(margin, window.innerHeight - Math.min(rect.height, window.innerHeight - margin)));
    modal.style.left = `${left}px`;
    modal.style.top = `${top}px`;
    modal.style.right = 'auto';
    modal.style.bottom = 'auto';
  }

  function positionNoteEditor(anchorDoc = getActiveDoc()) {
    const modal = document.querySelector('.note-modal');
    if (!modal) return;

    const width = Math.min(Math.max(modal.offsetWidth || 560, 360), window.innerWidth - 24);
    const height = Math.min(Math.max(modal.offsetHeight || 520, 280), window.innerHeight - 24);
    modal.style.width = `${width}px`;
    modal.style.height = `${height}px`;

    let left = 24;
    let top = 78;
    const docBox = anchorDoc?.wrapper?.getBoundingClientRect?.();
    if (docBox) {
      top = clamp(docBox.top + 16, 68, window.innerHeight - height - 12);
      if (docBox.left + docBox.width / 2 > window.innerWidth / 2) {
        left = 18;
      } else {
        left = window.innerWidth - width - 18;
      }
    }
    modal.style.left = `${clamp(left, 10, Math.max(10, window.innerWidth - width - 10))}px`;
    modal.style.top = `${clamp(top, 10, Math.max(10, window.innerHeight - height - 10))}px`;
    modal.style.right = 'auto';
    modal.style.bottom = 'auto';
  }

  function initNoteModalDrag() {
    const modal = document.querySelector('.note-modal');
    const header = modal?.querySelector('.note-modal-header');
    if (!modal || !header || modal.dataset.dragReady === '1') return;
    modal.dataset.dragReady = '1';

    header.addEventListener('pointerdown', e => {
      if (e.target.closest('button')) return;
      e.preventDefault();
      const startX = e.clientX;
      const startY = e.clientY;
      const rect = modal.getBoundingClientRect();
      const startLeft = rect.left;
      const startTop = rect.top;

      const onMove = ev => {
        modal.style.left = `${startLeft + ev.clientX - startX}px`;
        modal.style.top = `${startTop + ev.clientY - startY}px`;
        modal.style.right = 'auto';
        modal.style.bottom = 'auto';
      };

      const onUp = () => {
        document.removeEventListener('pointermove', onMove, true);
        document.removeEventListener('pointerup', onUp, true);
        clampModalToViewport(modal);
      };

      document.addEventListener('pointermove', onMove, true);
      document.addEventListener('pointerup', onUp, true);
    });
  }

  function resetNoteModalSplitIfNeeded() {
    if (!els.noteModalText || !els.noteModalPreview) return;
    if (!els.noteModalText.style.flexBasis && !els.noteModalPreview.style.flexBasis) {
      els.noteModalText.style.flex = '1 1 54%';
      els.noteModalPreview.style.flex = '1 1 46%';
    }
  }

  function initNoteModalSplit() {
    const splitter = document.getElementById('noteModalSplit');
    if (!splitter || splitter.dataset.splitReady === '1') return;
    splitter.dataset.splitReady = '1';

    splitter.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();

      const textEl = els.noteModalText;
      const previewEl = els.noteModalPreview;
      if (!textEl || !previewEl) return;

      const startY = e.clientY;
      const startText = textEl.getBoundingClientRect().height;
      const startPreview = previewEl.getBoundingClientRect().height;
      const total = Math.max(180, startText + startPreview);
      const minText = 72;
      const minPreview = 64;

      splitter.classList.add('dragging');
      document.body.style.userSelect = 'none';

      const onMove = ev => {
        const dy = ev.clientY - startY;
        const nextText = clamp(startText + dy, minText, Math.max(minText, total - minPreview));
        const nextPreview = Math.max(minPreview, total - nextText);

        textEl.style.flex = `0 0 ${nextText}px`;
        previewEl.style.flex = `1 1 ${nextPreview}px`;
      };

      const onUp = () => {
        splitter.classList.remove('dragging');
        document.body.style.userSelect = '';
        document.removeEventListener('pointermove', onMove, true);
        document.removeEventListener('pointerup', onUp, true);
      };

      document.addEventListener('pointermove', onMove, true);
      document.addEventListener('pointerup', onUp, true);
    });
  }

  function openNoteEditor({ title = '编辑笔记', hint = '', text = '', allowDelete = false, anchorDoc = null, initialGroups = [], currentNoteId = null } = {}) {
    return new Promise(resolve => {
      els.noteModalTitle.textContent = title;
      els.noteModalHint.textContent = hint;
      els.noteModalText.value = text || '';
      
      let currentGroups = [...initialGroups];
      const groupInput = document.getElementById('noteGroupInput');
      const groupTags = document.getElementById('noteGroupTags');
      const groupRelations = document.getElementById('noteGroupRelations');
      const datalist = document.getElementById('existingGroupsList');
      
      datalist.innerHTML = getAllExistingGroups().map(g => `<option value="${escapeHtml(g)}">`).join('');

      const renderGroups = () => {
        groupTags.innerHTML = currentGroups.map(g => 
          `<span class="group-tag">${escapeHtml(g)} <span class="remove-tag" data-group="${escapeHtml(g)}">×</span></span>`
        ).join('');
        
        if (currentGroups.length > 0 && currentNoteId) {
            const related = app.notes.filter(n => n.id !== currentNoteId && n.groups?.some(g => currentGroups.includes(g)));
            if (related.length > 0) {
                groupRelations.innerHTML = `<strong>同组的其他批注：</strong><br>` + related.map(n => 
                    `<a class="relation-link" data-id="${n.id}">P.${n.pageIndex + 1} - ${escapeHtml(shortText(n.note || n.text, 15))}</a>`
                ).join('');
            } else {
                groupRelations.innerHTML = '';
            }
        } else {
            groupRelations.innerHTML = '';
        }
      };

      const addGroup = () => {
        const val = groupInput.value.trim();
        if (val && !currentGroups.includes(val)) {
          currentGroups.push(val);
          renderGroups();
        }
        groupInput.value = '';
      };

      groupInput.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); addGroup(); } };
      document.getElementById('btnAddGroup').onclick = addGroup;
      
      groupTags.onclick = e => {
        if (e.target.classList.contains('remove-tag')) {
          currentGroups = currentGroups.filter(g => g !== e.target.dataset.group);
          renderGroups();
        }
      };

      groupRelations.onclick = e => {
          if (e.target.classList.contains('relation-link')) {
              const targetId = e.target.dataset.id;
              cleanup({ action: 'jump', targetId: targetId }); 
          }
      };

      renderGroups();

      const updatePreview = () => { els.noteModalPreview.innerHTML = safeRenderMarkdown(els.noteModalText.value); };
      updatePreview();
      els.noteModalText.addEventListener('input', updatePreview);
      els.noteModalDelete.style.visibility = allowDelete ? 'visible' : 'hidden';
      els.noteModalBackdrop.classList.add('show');
      initNoteModalDrag();
      initNoteModalSplit();
      positionNoteEditor(anchorDoc || getActiveDoc());
      resetNoteModalSplitIfNeeded();
      setTimeout(() => {
        els.noteModalText.focus();
      }, 30);

      const cleanup = result => {
        els.noteModalText.removeEventListener('input', updatePreview);
        els.noteModalBackdrop.classList.remove('show');
        els.noteModalSave.onclick = null;
        els.noteModalCancel.onclick = null;
        els.noteModalClose.onclick = null;
        els.noteModalDelete.onclick = null;
        document.removeEventListener('keydown', onKey, true);
        resolve(result);
      };
      
      const onKey = e => {
        if (!els.noteModalBackdrop.classList.contains('show')) return;
        if (e.key === 'Escape') { e.preventDefault(); cleanup({ action: 'cancel' }); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); cleanup({ action: 'save', text: els.noteModalText.value, groups: currentGroups }); }
      };
      document.addEventListener('keydown', onKey, true);
      els.noteModalSave.onclick = () => cleanup({ action: 'save', text: els.noteModalText.value, groups: currentGroups });
      els.noteModalCancel.onclick = () => cleanup({ action: 'cancel' });
      els.noteModalClose.onclick = () => cleanup({ action: 'cancel' });
      els.noteModalDelete.onclick = () => cleanup({ action: 'delete' });
    });
  }

  function upsertNote(note) {
    const idx = app.notes.findIndex(n => n.id === note.id);
    const clean = sanitizeNotes([{ ...note, updatedAt: Date.now() }])[0];
    if (!clean) return;
    if (idx >= 0) app.notes[idx] = clean;
    else app.notes.push(clean);
    refreshNotesUI();
    scheduleWorkspaceSave();
    schedulePersistentFullSave({ silent: true });
  }

  function deleteNote(noteId) {
    const before = app.notes.length;
    app.notes = app.notes.filter(n => n.id !== noteId);
    if (app.notes.length !== before) {
      refreshNotesUI();
      scheduleWorkspaceSave();
      schedulePersistentFullSave({ silent: true });
    }
  }

  function refreshNotesUI() {
    app.docs.forEach(doc => {
      for (let i = 0; i < doc.pages.length; i++) {
        if (doc.pages[i]?.loaded) renderStoredNotesForPage(doc, i);
      }
      renderNotesList(doc);
      renderGroupsList(doc);
    });
  }

  function openNotesTab(doc) {
    if (!doc) return;
    const show = doc.sidebar.style.display !== 'flex';
    if (show) {
      doc.sidebar.style.display = 'flex';
      doc.sidebarBtn.classList.add('active');
    }
    const tabs = doc.sidebar.querySelectorAll('.sidebar-tab');
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === 'notes'));
    doc.sidebar.querySelector('.toc-area').style.display = 'none';
    doc.sidebar.querySelector('.search-area').style.display = 'none';
    doc.sidebar.querySelector('.groups-area').style.display = 'none';
    doc.sidebar.querySelector('.notes-area').style.display = 'block';
    renderNotesList(doc);
    doc.sidebar.querySelector('.note-search-input')?.focus();
  }


  function isNotesTabVisible(doc) {
    if (!doc?.sidebar) return false;
    if (doc.sidebar.style.display !== 'flex') return false;
    const notesArea = doc.sidebar.querySelector('.notes-area');
    const activeTab = doc.sidebar.querySelector('.sidebar-tab.active');
    return !!notesArea && notesArea.style.display !== 'none' && activeTab?.dataset?.tab === 'notes';
  }

  function revealNoteInSidebar(doc, noteId, { flash = true } = {}) {
    if (!doc?.sidebar || !noteId || !isNotesTabVisible(doc)) return false;

    renderNotesList(doc);

    const list = doc.sidebar.querySelector('.notes-list');
    let item = list?.querySelector(`[data-note-id="${CSS.escape(noteId)}"]`);

    if (!item) {
      const input = doc.sidebar.querySelector('.note-search-input');
      if (input?.value) {
        input.value = '';
        renderNotesList(doc);
        item = doc.sidebar.querySelector('.notes-list')?.querySelector(`[data-note-id="${CSS.escape(noteId)}"]`);
      }
    }

    if (!item) return false;

    doc.sidebar.querySelectorAll('.note-item.active-note').forEach(el => el.classList.remove('active-note'));
    item.classList.add('active-note');
    item.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });

    if (flash) {
      clearTimeout(item._activeTimer);
      item._activeTimer = setTimeout(() => item.classList.remove('active-note'), 2600);
    }

    return true;
  }

  function renderNotesList(doc) {
    if (!doc?.sidebar) return;
    const list = doc.sidebar.querySelector('.notes-list');
    if (!list) return;

    const q = (doc.sidebar.querySelector('.note-search-input')?.value || '').trim().toLowerCase();
    const notes = getDocNotes(doc).filter(n => {
      if (!q) return true;
      return [
        n.note, n.text, String(n.pageIndex + 1),
        n.type === 'highlight' ? '高亮' : '便签'
      ].join(' ').toLowerCase().includes(q);
    }).sort(compareNotesByArticleOrder);

    list.innerHTML = '';
    if (!notes.length) {
      list.innerHTML = `<div style="padding:10px;color:var(--text-muted);line-height:1.6;">暂无批注。可先选中文本点击“标记”，或给当前页添加页面便签。</div>`;
      return;
    }

    const frag = document.createDocumentFragment();

    for (const note of notes) {
      const item = document.createElement('div');
      item.className = 'note-item';
      item.dataset.noteId = note.id;

      const type = note.type === 'highlight' ? '高亮' : '便签';
      const colorDot = note.type === 'highlight'
        ? `<i class="note-color-dot" style="background:${HIGHLIGHT_DOT_COLORS[normalizeHighlightColor(note.color)]}"></i>`
        : '';

      const preview = getNoteRawPreview(note);
      const mainText = preview.primary || preview.secondary || '';
      const secondaryText = preview.primary && preview.secondary ? preview.secondary : '';
      const title = note.type === 'highlight'
        ? shortText(note.text || note.note || '高亮批注', 90)
        : shortText(note.note || '页面便签', 90);

      item.innerHTML = `
        <div class="note-meta">
          <span class="note-type">${colorDot}${type}</span>
          <span>${escapeHtml(describeNotePosition(note))}</span>
        </div>
        <div class="note-title">${escapeHtml(title)}</div>
        <div class="note-body markdown-body">${mainText ? safeRenderMarkdown(mainText) : escapeHtml('（空批注）')}</div>
        ${secondaryText ? `<div class="note-quote">${escapeHtml(shortText(secondaryText, 160))}</div>` : ''}
        <div class="note-actions-row"><button data-action="jump">跳转</button><button data-action="edit">编辑</button><button data-action="delete">删除</button></div>`;

      item.onclick = e => {
        const action = e.target?.dataset?.action || 'jump';
        e.stopPropagation();

        if (action === 'delete') {
          if (confirm('删除这条批注吗？')) deleteNote(note.id);
          return;
        }

        if (action === 'edit') {
          editExistingNote(note.id);
          return;
        }

        saveNavState();

        if (note.type === 'highlight' && note.rects?.length) {
          const firstRect = note.rects.find(r => r.pageIndex === note.pageIndex) || note.rects[0];
          const el = doc.pages[firstRect.pageIndex]?.el;
          if (el) {
            const yInPage = (firstRect.y + firstRect.h / 2) * el.offsetHeight;
            const targetY = el.offsetTop + yInPage - doc.scroller.clientHeight / 2;
            doc.scroller.scrollTo({ top: Math.max(0, targetY), behavior: 'smooth' });
            updateIndicator(doc);
            scheduleRenderAround(doc);
            scheduleWorkspaceSave();
            setTimeout(() => performSync(doc), 120);
          }
        } else {
          scrollDocToPage(doc, note.pageIndex, 0, true);
        }
      };

      frag.appendChild(item);
    }

    list.appendChild(frag);
  }

  function renderGroupsList(doc) {
    if (!doc?.sidebar) return;
    const list = doc.sidebar.querySelector('.groups-list');
    if (!list) return;

    const notes = getDocNotes(doc);
    const groupsMap = {};
    const unGrouped = [];

    notes.forEach(n => {
      if (!n.groups || n.groups.length === 0) {
        unGrouped.push(n);
      } else {
        n.groups.forEach(g => {
          if (!groupsMap[g]) groupsMap[g] = [];
          groupsMap[g].push(n);
        });
      }
    });

    const groupNames = Object.keys(groupsMap).sort();

    if (groupNames.length === 0) {
      list.innerHTML = `<div style="padding:10px;color:var(--text-muted);line-height:1.6;">暂无分组。在编辑批注时添加组名即可创建组。</div>`;
      return;
    }

    let html = '';
    groupNames.forEach(g => {
        html += `
        <div class="group-folder open">
            <div class="group-folder-header">
                <span>📁 ${escapeHtml(g)}</span>
                <span style="color:var(--text-muted);">${groupsMap[g].length} 篇</span>
            </div>
            <div class="group-folder-content">
                ${groupsMap[g].sort(compareNotesByArticleOrder).map(n => `
                    <div class="group-item-mini" data-id="${n.id}">
                        <span class="note-chip-group">P.${n.pageIndex + 1}</span>
                        ${escapeHtml(shortText(n.note || n.text, 25))}
                    </div>
                `).join('')}
            </div>
        </div>`;
    });

    list.innerHTML = html;

    list.querySelectorAll('.group-folder-header').forEach(header => {
        header.onclick = () => header.parentElement.classList.toggle('open');
    });

    list.querySelectorAll('.group-item-mini').forEach(item => {
        item.onclick = (e) => {
            const noteId = e.currentTarget.dataset.id;
            const note = app.notes.find(n => n.id === noteId);
            if(note) {
                saveNavState();
                if (note.type === 'highlight' && note.rects?.length) {
                  const firstRect = note.rects.find(r => r.pageIndex === note.pageIndex) || note.rects[0];
                  const el = doc.pages[firstRect.pageIndex]?.el;
                  if (el) {
                    doc.scroller.scrollTo({
                      top: Math.max(0, el.offsetTop + (firstRect.y + firstRect.h / 2) * el.offsetHeight - doc.scroller.clientHeight / 2),
                      behavior: 'smooth'
                    });
                    scheduleRenderAround(doc);
                  }
                } else {
                  scrollDocToPage(doc, note.pageIndex, 0, false);
                }
                editExistingNote(note.id);
            }
        };
    });
  }

  async function editExistingNote(noteId) {
    const note = app.notes.find(n => n.id === noteId);
    if (!note) return;
    const doc = app.docs.find(d => noteMatchesDoc(note, d));
    if (doc) {
      app.userActiveDocId = doc.id;
      if (note.type === 'highlight' && note.rects?.length) {
        const firstRect = note.rects.find(r => r.pageIndex === note.pageIndex) || note.rects[0];
        const el = doc.pages[firstRect.pageIndex]?.el;
        if (el) {
          doc.scroller.scrollTo({
            top: Math.max(0, el.offsetTop + (firstRect.y + firstRect.h / 2) * el.offsetHeight - doc.scroller.clientHeight / 2),
            behavior: 'smooth'
          });
          scheduleRenderAround(doc);
        }
      } else {
        scrollDocToPage(doc, note.pageIndex, 0, false);
      }
    }
    const result = await openNoteEditor({
      title: note.type === 'highlight' ? '编辑高亮笔记' : '编辑页面便签',
      hint: `${note.docName || '当前文档'} · 第 ${note.pageIndex + 1} 页${note.text ? ` · 原文：${shortText(note.text, 90)}` : ''}`,
      text: note.note || '',
      allowDelete: true,
      anchorDoc: doc || getActiveDoc(),
      initialGroups: note.groups || [],
      currentNoteId: note.id
    });
    
    if (result.action === 'jump') {
        editExistingNote(result.targetId);
        return;
    }
    if (result.action === 'delete') {
      deleteNote(note.id);
      toast('批注已删除。');
    } else if (result.action === 'save') {
      upsertNote({ ...note, note: result.text.trim(), groups: result.groups || [] });
      toast('批注已保存。');
    }
  }

  async function addOrEditPageNote(doc = getActiveDoc()) {
    if (!doc) { toast('请先打开并加载 PDF。'); return; }
    app.userActiveDocId = doc.id;
    const pageIndex = getCurrentPageIndex(doc);
    const key = docKey(doc);
    const existing = app.notes.find(n => n.type === 'page-note' && noteMatchesDoc(n, doc) && n.pageIndex === pageIndex);
    const result = await openNoteEditor({
      title: existing ? '编辑页面便签' : '添加页面便签',
      hint: `${doc.file.name} · 第 ${pageIndex + 1} 页`,
      text: existing?.note || '',
      allowDelete: !!existing,
      anchorDoc: doc,
      initialGroups: existing?.groups || [],
      currentNoteId: existing?.id
    });
    
    if (result.action === 'jump') {
        editExistingNote(result.targetId);
        return;
    }
    if (result.action === 'delete' && existing) {
      deleteNote(existing.id);
      toast('页面便签已删除。');
      return;
    }
    if (result.action !== 'save') return;
    const noteText = result.text.trim();
    if (!noteText && !existing) return;
    upsertNote({
      id: existing?.id || makeNoteId(),
      type: 'page-note',
      docKey: key,
      docName: doc.file.name,
      docSize: doc.file.size || 0,
      docLastModified: doc.file.lastModified || 0,
      pageIndex,
      text: '',
      note: noteText,
      groups: result.groups || [],
      rects: [],
      createdAt: existing?.createdAt || Date.now()
    });
    toast('页面便签已保存。');
  }

  function rectIntersectsPage(rect, pageBox) {
    return rect.right > pageBox.left && rect.left < pageBox.right && rect.bottom > pageBox.top && rect.top < pageBox.bottom;
  }

  function normalizeHighlightRects(rects) {
    if (!Array.isArray(rects) || !rects.length) return [];

    const byPage = new Map();
    for (const r of rects) {
      if (!r || r.w <= 0 || r.h <= 0) continue;
      const pageIndex = Math.max(0, Number(r.pageIndex || 0));
      if (!byPage.has(pageIndex)) byPage.set(pageIndex, []);
      byPage.get(pageIndex).push({
        pageIndex,
        x: clamp(Number(r.x || 0), 0, 1),
        y: clamp(Number(r.y || 0), 0, 1),
        w: clamp(Number(r.w || 0), 0, 1),
        h: clamp(Number(r.h || 0), 0, 1)
      });
    }

    const output = [];
    for (const [pageIndex, list] of byPage) {
      list.sort((a, b) => (a.y - b.y) || (a.x - b.x));
      const lines = [];

      for (const r of list) {
        const cy = r.y + r.h / 2;
        const line = lines.find(line => Math.abs(line.cy - cy) < Math.max(line.h, r.h) * 0.62);
        if (line) {
          line.rects.push(r);
          const total = line.rects.length;
          line.cy = (line.cy * (total - 1) + cy) / total;
          line.h = Math.max(line.h, r.h);
        } else {
          lines.push({ cy, h: r.h, rects: [r] });
        }
      }

      for (const line of lines) {
        const segments = line.rects
          .map(r => ({
            x1: r.x,
            x2: Math.min(1, r.x + r.w),
            y1: r.y,
            y2: Math.min(1, r.y + r.h)
          }))
          .sort((a, b) => a.x1 - b.x1);

        const merged = [];
        for (const seg of segments) {
          const last = merged[merged.length - 1];
          if (
            last &&
            seg.x1 <= last.x2 + 0.006 &&
            Math.max(0, Math.min(last.y2, seg.y2) - Math.max(last.y1, seg.y1)) >=
              Math.min(last.y2 - last.y1, seg.y2 - seg.y1) * 0.35
          ) {
            last.x2 = Math.max(last.x2, seg.x2);
            last.y1 = Math.min(last.y1, seg.y1);
            last.y2 = Math.max(last.y2, seg.y2);
          } else {
            merged.push({ ...seg });
          }
        }

        for (const m of merged) {
          const y1 = clamp(m.y1 + 0.003, 0, 1);
          const y2 = clamp(m.y2 - 0.001, 0, 1);
          output.push({
            pageIndex,
            x: clamp(m.x1, 0, 1),
            y: y1,
            w: clamp(m.x2 - m.x1, 0, 1),
            h: clamp(Math.max(0.008, y2 - y1), 0.006, 1)
          });
        }
      }
    }

    return output.sort((a, b) => (a.pageIndex - b.pageIndex) || (a.y - b.y) || (a.x - b.x));
  }

  async function addHighlightFromSelection(preferredDoc = getActiveDoc()) {
    const sel = window.getSelection();
    const selectedText = String(sel?.toString() || '').trim();
    const range = getSelectionRange();

    if (!range || !selectedText) {
      toast('请先在 PDF 文本上选中要高亮的内容。');
      return;
    }

    let doc = preferredDoc && preferredDoc.wrapper.contains(range.commonAncestorContainer)
      ? preferredDoc
      : findDocForSelection(range);

    if (!doc) {
      toast('没有识别到选中的 PDF 文档；请在页面文字层加载完成后重新选择。', 2600);
      return;
    }
    app.userActiveDocId = doc.id;

    const rawRects = Array.from(range.getClientRects()).filter(r => r.width > 1 && r.height > 1);
    const rects = [];
    for (const r of rawRects) {
      for (let i = 0; i < doc.pages.length; i++) {
        const pageEl = doc.pages[i].el;
        const box = pageEl.getBoundingClientRect();
        if (!rectIntersectsPage(r, box)) continue;
        const x1 = clamp((Math.max(r.left, box.left) - box.left) / Math.max(1, box.width), 0, 1);
        const y1 = clamp((Math.max(r.top, box.top) - box.top) / Math.max(1, box.height), 0, 1);
        const x2 = clamp((Math.min(r.right, box.right) - box.left) / Math.max(1, box.width), 0, 1);
        const y2 = clamp((Math.min(r.bottom, box.bottom) - box.top) / Math.max(1, box.height), 0, 1);
        if (x2 - x1 > 0.002 && y2 - y1 > 0.002) rects.push({ pageIndex: i, x: x1, y: y1, w: x2 - x1, h: y2 - y1 });
      }
    }

    const normalizedRects = normalizeHighlightRects(rects);
    if (!normalizedRects.length) {
      toast('没有取得有效的文本位置；请确认页面文字层已加载后再选中。', 2600);
      return;
    }

    const firstPage = normalizedRects.reduce((min, r) => Math.min(min, r.pageIndex), normalizedRects[0].pageIndex);
    const result = await openNoteEditor({
      title: '添加文本高亮',
      hint: `${doc.file.name} · 第 ${firstPage + 1} 页 · 原文：${shortText(selectedText, 120)}`,
      text: '',
      allowDelete: false,
      anchorDoc: doc,
      initialGroups: [],
      currentNoteId: null
    });

    if (result.action !== 'save') return;
    upsertNote({
      id: makeNoteId(),
      type: 'highlight',
      docKey: docKey(doc),
      docName: doc.file.name,
      docSize: doc.file.size || 0,
      docLastModified: doc.file.lastModified || 0,
      pageIndex: firstPage,
      text: selectedText,
      note: result.text.trim(),
      color: app.highlightColor,
      rects: normalizedRects,
      groups: result.groups || [],
      createdAt: Date.now()
    });

    sel.removeAllRanges();
    toast('高亮已保存。');
  }

  function renderStoredNotesForPage(doc, pageIndex) {
    const pageState = doc.pages[pageIndex];
    if (!pageState?.el || !pageState.loaded) return;

    const content = pageState.el.querySelector('.page-content') || pageState.el;
    pageState.el.querySelectorAll('.note-highlight-layer,.page-note-marker').forEach(el => el.remove());
    content.querySelectorAll?.('.note-highlight-layer')?.forEach(el => el.remove());

    const pageNotes = getDocNotes(doc).filter(n => n.pageIndex === pageIndex || n.rects?.some(r => r.pageIndex === pageIndex));
    if (!pageNotes.length) return;

    const layer = document.createElement('div');
    layer.className = 'note-highlight-layer';
    let hasHighlight = false;

    for (const note of pageNotes) {
      if (note.type !== 'highlight') continue;
      for (const r of note.rects.filter(x => x.pageIndex === pageIndex)) {
        const div = document.createElement('div');
        div.className = 'note-highlight';
        div.title = note.note || note.text || '高亮';
        div.style.background = getHighlightColorValue(note.color);
        div.style.left = `${r.x * 100}%`;
        div.style.top = `${r.y * 100}%`;
        div.style.width = `${r.w * 100}%`;
        div.style.height = `${r.h * 100}%`;
        div.onclick = e => {
          e.preventDefault();
          e.stopPropagation();
          revealNoteInSidebar(doc, note.id);
          editExistingNote(note.id);
        };
        layer.appendChild(div);
        hasHighlight = true;
      }
    }

    if (hasHighlight) content.appendChild(layer);

    const pageNote = pageNotes.find(n => n.type === 'page-note' && n.pageIndex === pageIndex);
    if (pageNote) {
      const marker = document.createElement('button');
      marker.type = 'button';
      marker.className = 'page-note-marker';
      marker.textContent = '笔记';
      marker.title = pageNote.note || '页面便签';
      marker.onclick = e => {
        e.preventDefault();
        e.stopPropagation();
        revealNoteInSidebar(doc, pageNote.id);
        editExistingNote(pageNote.id);
      };
      pageState.el.appendChild(marker);
    }
  }

  function saveNavState() {
    if (!app.docs.length || app.suppressHistory) return;
    const state = app.docs.map(doc => doc.scroller.scrollTop);
    const current = app.navHistory[app.navIndex];
    if (current && JSON.stringify(current) === JSON.stringify(state)) return;
    if (app.navIndex < app.navHistory.length - 1) app.navHistory = app.navHistory.slice(0, app.navIndex + 1);
    app.navHistory.push(state);
    if (app.navHistory.length > 40) app.navHistory.shift();
    else app.navIndex++;
    updateHistoryButtons();
  }

  function restoreNavState(state) {
    app.suppressHistory = true;
    state.forEach((top, i) => { if (app.docs[i]) app.docs[i].scroller.scrollTop = top; });
    updateAllIndicators();
    scheduleRenderAll();
    scheduleWorkspaceSave();
    updateHistoryButtons();
    setTimeout(() => { app.suppressHistory = false; }, 300);
  }

  function updateHistoryButtons() {
    els.btnHistoryBack.disabled = app.navIndex <= 0;
    els.btnHistoryForward.disabled = app.navIndex >= app.navHistory.length - 1;
  }

  async function clearWorkspace(removeStorage = true) {
    app.files = [];
    await destroyAllDocs();
    app.anchors = [];
    app.navHistory = [];
    app.navIndex = -1;
    app.userActiveDocId = null;
    if (removeStorage) app.notes = [];
    updateFileHint();
    updateHistoryButtons();
    updateMemoryStats();
    if (removeStorage) localStorage.removeItem(WORKSPACE_KEY);
    els.container.style.justifyContent = '';
    showEmptyState();
  }

  function resetView() {
    if (!app.docs.length) return;
    applyGlobalZoom(90);
    app.anchors = [new Array(app.docs.length).fill(0)];
    app.syncEnabled = true;
    updateSyncButton();
    app.docs.forEach(doc => scrollDocToPage(doc, 0, 0, false));
    updateAllIndicators();
    scheduleWorkspaceSave();
    saveNavState();
  }

  async function saveProjectManually() {
    if (!app.docs.length) {
      toast('当前没有可保存的 PDF。');
      return;
    }
    app.projectActive = true;
    app.autoSaveProject = !!els.chkAutoSave.checked;
    app.savePdfCopy = !!els.chkSavePdfCopy.checked;
    saveWorkspaceNow();
    await writePersistentWorkspaceFull({ silent: false, saveFiles: app.savePdfCopy });
    await refreshPersistentHint();
  }

  function switchToTemporaryMode() {
    app.projectActive = false;
    updatePersistentButtons();
    toast('已切换为临时阅读；不会继续自动保存到项目数据库。');
  }

  function closeToolbarMenus(exceptMenu = null) {
    document.querySelectorAll('.toolbar-menu[open]').forEach(menu => {
      if (menu !== exceptMenu) menu.removeAttribute('open');
    });
  }

  document.addEventListener('toggle', e => {
    const menu = e.target;
    if (menu instanceof HTMLDetailsElement && menu.classList.contains('toolbar-menu') && menu.open) {
      closeToolbarMenus(menu);
    }
  }, true);

  document.addEventListener('pointerdown', e => {
    const menu = e.target.closest?.('.toolbar-menu');
    if (!menu) {
      closeToolbarMenus();
      return;
    }
    if (e.target.closest('summary')) closeToolbarMenus(menu);
  }, true);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeToolbarMenus();
  }, true);

  els.container.addEventListener('click', async e => {
    const closeButton = e.target.closest?.('.btn-close');
    if (!closeButton) return;
    e.preventDefault();
    e.stopPropagation();
    const wrapper = closeButton.closest('.panel-wrapper');
    const doc = app.docs.find(d => d.wrapper === wrapper);
    if (doc) await removeDocumentByDoc(doc, { confirmClose: false });
  }, true);

  function getNearestDocFromPoint(x) {
    if (!app.docs.length) return null;
    let best = null;
    let bestDist = Infinity;
    for (const doc of app.docs) {
      const box = doc.wrapper.getBoundingClientRect();
      if (x >= box.left && x <= box.right) return doc;
      const dist = Math.min(Math.abs(x - box.left), Math.abs(x - box.right));
      if (dist < bestDist) {
        bestDist = dist;
        best = doc;
      }
    }
    return best || getActiveDoc();
  }

  els.container.addEventListener('wheel', e => {
    if (!app.docs.length) return;

    if (e.target.closest?.('.pdf-panel,.panel-sidebar,.sidebar-content,.toolbar,.toolbar-popover,.note-modal,input,textarea,select,button')) {
      return;
    }

    const wrapper = e.target.closest?.('.panel-wrapper');
    const doc = wrapper
      ? app.docs.find(d => d.wrapper === wrapper)
      : getNearestDocFromPoint(e.clientX);

    if (!doc || !doc.scroller) return;
    e.preventDefault();
    app.userActiveDocId = doc.id;

    const unit = e.deltaMode === 1 ? 36 : e.deltaMode === 2 ? doc.scroller.clientHeight : 1;
    doc.scroller.scrollTop += e.deltaY * unit;
    doc.scroller.scrollLeft += e.deltaX * unit;
  }, { passive: false });

  // Global controls
  els.btnAddFile.onclick = () => els.fileInput.click();
  els.fileInput.onchange = e => {
    const picked = Array.from(e.target.files || []).filter(f => /\.pdf$/i.test(f.name) || f.type === 'application/pdf');
    const freeSlots = Math.max(0, MAX_DOCS - app.files.length);
    const accepted = picked.slice(0, freeSlots);
    for (const f of accepted) app.files.push(f);
    const skipped = Math.max(0, picked.length - accepted.length);
    e.target.value = '';
    updateFileHint();
    if (skipped > 0) toast(`已加入 ${accepted.length} 个，最多同时打开 ${MAX_DOCS} 个 PDF。`);
    else if (accepted.length > 0) toast(`已加入 ${accepted.length} 个 PDF。`);
  };

  els.btnLoad.onclick = () => loadFiles();
  els.btnClear.onclick = () => clearWorkspace(true);
  els.btnSaveProject.onclick = saveProjectManually;
  els.btnExportProject.onclick = exportProjectFile;
  els.btnImportProject.onclick = () => els.projectFileInput.click();
  els.projectFileInput.onchange = e => importProjectFile(e.target.files?.[0]);
  els.btnRestorePersist.onclick = restorePersistentWorkspace;
  els.btnTempMode.onclick = switchToTemporaryMode;
  els.chkAutoSave.onchange = () => { app.autoSaveProject = !!els.chkAutoSave.checked; saveWorkspaceNow(); updatePersistentButtons(); if (app.projectActive && app.autoSaveProject) schedulePersistentFullSave({ silent: true }); };
  els.chkSavePdfCopy.onchange = () => { app.savePdfCopy = !!els.chkSavePdfCopy.checked; saveWorkspaceNow(); updatePersistentButtons(); };
  els.btnClearPersist.onclick = async () => {
    if (!confirm('确定删除浏览器里的本机暂存项目吗？当前打开的文档也会清空。')) return;
    await clearPersistentStorage();
    await clearWorkspace(true);
    toast('已删除本机暂存项目数据。');
  };
  els.highlightColorSwatches.forEach(btn => {
    btn.onclick = e => {
      e.preventDefault();
      setHighlightColor(btn.dataset.color);
      toast(`高亮颜色已切换：${btn.title.replace('高亮', '') || '当前颜色'}`, 1200);
    };
  });
  setHighlightColor(app.highlightColor);

  els.btnToggleSync.onclick = () => { app.syncEnabled = !app.syncEnabled; updateSyncButton(); scheduleWorkspaceSave(); };
  els.btnAnchor.onclick = addAnchor;
  els.btnPageNote.onclick = () => addOrEditPageNote(getActiveDoc());
  els.btnHighlight.onclick = () => addHighlightFromSelection(getActiveDoc());
  els.btnShowNotes.onclick = () => openNotesTab(getActiveDoc());
  els.btnResetView.onclick = resetView;
  els.btnHistoryBack.onclick = () => { if (app.navIndex > 0) restoreNavState(app.navHistory[--app.navIndex]); };
  els.btnHistoryForward.onclick = () => { if (app.navIndex < app.navHistory.length - 1) restoreNavState(app.navHistory[++app.navIndex]); };
  els.btnGlobalZoomOut.onclick = () => applyGlobalZoom(parseInt(els.globalZoomInput.value, 10) - 10);
  els.btnGlobalZoomIn.onclick = () => applyGlobalZoom(parseInt(els.globalZoomInput.value, 10) + 10);
  els.globalZoomInput.addEventListener('change', () => applyGlobalZoom(els.globalZoomInput.value));
  els.globalZoomInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.currentTarget.blur(); applyGlobalZoom(e.currentTarget.value); } });

  els.btnSingleWidthDown.onclick = () => { app.singleDocWidth = clamp(app.singleDocWidth - 5, 45, 100); els.singleWidthInput.value = Math.round(app.singleDocWidth); applyAllPanelWidths(); scheduleRenderAll(); scheduleWorkspaceSave(); };
  els.btnSingleWidthUp.onclick = () => { app.singleDocWidth = clamp(app.singleDocWidth + 5, 45, 100); els.singleWidthInput.value = Math.round(app.singleDocWidth); applyAllPanelWidths(); scheduleRenderAll(); scheduleWorkspaceSave(); };
  els.singleWidthInput.addEventListener('change', () => { app.singleDocWidth = clamp(parseInt(els.singleWidthInput.value, 10) || 92, 45, 100); els.singleWidthInput.value = Math.round(app.singleDocWidth); applyAllPanelWidths(); scheduleRenderAll(); scheduleWorkspaceSave(); });
  els.singleWidthInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.currentTarget.blur(); } });
  els.singleAlignSelect.onchange = e => { app.singleDocAlign = e.target.value; applyAllPanelWidths(); scheduleWorkspaceSave(); };
  els.btnResetLayout.onclick = resetLayout;

  els.themeSelect.onchange = e => { document.body.className = `theme-${e.target.value}`; scheduleWorkspaceSave(); };

  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.key === '=' || e.key === '+') els.btnGlobalZoomIn.click();
    if (e.key === '-') els.btnGlobalZoomOut.click();
    if (e.key === 'Home') els.btnResetView.click();
    if (e.altKey && e.key === 'ArrowLeft') els.btnHistoryBack.click();
    if (e.altKey && e.key === 'ArrowRight') els.btnHistoryForward.click();
  });

  window.addEventListener('resize', () => {
    clearTimeout(app.resizeTimer);
    app.resizeTimer = setTimeout(() => {
      const states = app.docs.map(getPanelScrollState);
      applyAllPanelWidths();
      app.docs.forEach(invalidatePagesForZoom);
      app.docs.forEach((doc, i) => restorePanelScrollState(doc, states[i]));
      scheduleRenderAll();
    }, 180);
  });

  window.addEventListener('beforeunload', () => {
    saveWorkspaceNow();
    app.docs.forEach(unloadAllPages);
  });

  loadWorkspaceMeta();
  refreshPersistentHint();
  updateSyncButton();
})();
</script>
</body>
</html>
